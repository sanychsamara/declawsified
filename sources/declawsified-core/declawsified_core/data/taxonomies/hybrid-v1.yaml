      # ---------- fun-hobbies ----------
      fun-hobbies:
        description: >
          Recreation, hobbies, games, entertainment, creative pursuits,
          travel, leisure activities.
        children:
          cooking:
            description: Recipes, meal prep, baking, culinary experiments.
            children:
              baking:
                description: Bread, pastries, sourdough, cake, baking science.
                children:
                  bread:
                    description: Yeast breads, sourdough, quick breads, rolls, and other leavened baked goods primarily made from flour, water, and various leavening agents.
                  cakes:
                    description: Layer cakes, cupcakes, sponge cakes, celebration cakes, and other sweet desserts leavened with chemical agents or whipped eggs and typically frosted or glazed.
                  pastries:
                    description: Croissants, puff pastry, danishes, choux pastry, and other flaky or delicate baked goods made with laminated or enriched doughs and butter.
                  cookies:
                    description: Chocolate chip cookies, shortbread, biscotti, macarons, and other small, sweet, hand-held treats that are typically crisp or chewy and portioned individually.
                  pies-tarts:
                    description: Fruit pies, custard tarts, quiches, galettes, and other baked items consisting of a pastry crust filled with sweet or savory fillings.
                  baking-science:
                    description: Understanding how ingredients interact, chemical reactions during baking, temperature effects, gluten development, and diagnosing why bakes fail.
              grilling:
                description: BBQ, grilling, smoking, outdoor cooking.
                children:
                  grill-equipment:
                    description: Questions about selecting, using, and maintaining grills, smokers, thermometers, tools, and accessories for outdoor cooking.
                  grilling-techniques:
                    description: Questions about fundamental cooking methods like direct vs indirect heat, two-zone fire management, searing techniques, temperature control strategies, and smoking processes independent of specific foods.
                  grilling-recipes:
                    description: Questions about specific foods to grill, including meat cuts, vegetables, seafood, cooking times and temperatures for particular items, and complete recipe instructions for grilled dishes.
                  fuel-flavoring:
                    description: Questions about fuel types like charcoal, gas, wood, pellets, and flavoring components including rubs, marinades, sauces, and wood chips for smoking.
                  grill-maintenance:
                    description: Questions about cleaning procedures, rust prevention, seasonal storage, cover usage, and general upkeep of grilling equipment.
              meal-prep:
                description: Sunday meal prep, batch cooking, freezer meals.
                children:
                  weekly-planning:
                    description: Creating comprehensive weekly menus, selecting batch-cookable recipes, and organizing shopping lists to streamline Sunday meal preparation sessions.
                  batch-cooking-techniques:
                    description: Executing efficient large-scale cooking methods including simultaneous multi-recipe preparation, one-pot meals, and timed oven-to-stovetop workflows.
                  storage-containers:
                    description: Selecting appropriate glass or plastic containers, understanding portion sizing, implementing labeling systems, and maximizing refrigerator and freezer organization.
                  freezer-meal-prep:
                    description: Assembling complete freezer-to-oven meals, flash-freezing components, preventing freezer burn, and planning proper thawing and reheating sequences.
                  component-prep:
                    description: Preparing versatile ingredients like chopped vegetables, cooked grains, marinated proteins, and sauces to assemble quick meals throughout the week.
              cuisines:
                description: Different culinary traditions and regional cuisines.
                children:
                  asian-cuisines:
                    description: Culinary traditions from East, Southeast, and South Asia including Chinese, Japanese, Thai, Korean, Vietnamese, and Indian cooking techniques and flavor profiles.
                    children:
                      chinese-cuisine:
                        description: Regional Chinese cooking styles including Sichuan, Cantonese, and Shandong techniques with wok hei, complex sauces, and diverse ingredients.
                        children:
                          sichuan-cuisine:
                            description: Sichuan regional cooking characterized by mala numbing-spice flavors, doubanjiang, and aggressive seasoning techniques.
                          cantonese-cuisine:
                            description: Cantonese regional cooking emphasizing fresh ingredients, delicate steaming, and iconic dim sum service with tea.
                          northern-chinese-cuisine:
                            description: Northern regional styles featuring wheat-based staples, hand-pulled noodles, and hearty braised meats from Shandong and Beijing traditions.
                          jiangnan-cuisine:
                            description: Jiangsu and Zhejiang refined cooking focusing on elegant presentation, freshwater ingredients, and subtle sweet-savory balances.
                          hunan-cuisine:
                            description: Hunan regional cooking known for fresh chili heat, fermented black beans, and smoked proteins without the numbing sensation of Sichuan.
                          chinese-hotpot:
                            description: Communal dining experience with regional broth variations from Chongqing spicy to Cantonese clear, centered on dipping fresh ingredients.
                          chinese-roast-meats:
                            description: Traditional siu mei techniques for char siu, roast duck, and crispy pork using specific marinades and hanging-oven methods.
                          chinese-medicinal-food:
                            description: Cooking based on Traditional Chinese Medicine principles balancing yin-yang properties and using therapeutic ingredients like ginseng and goji berries.
                      japanese-cuisine:
                        description: Japanese culinary traditions emphasizing umami, seasonal ingredients, precise knife work, sushi, ramen, and fermentation methods.
                        children:
                          sushi-sashimi:
                            description: Raw fish and seafood preparations including nigiri, maki rolls, and sashimi slices with proper rice seasoning and wasabi usage.
                            children:
                              nigiri-sushi:
                                description: Hand-pressed sushi consisting of vinegared rice shaped by hand and topped with raw or cooked seafood, focusing on forming techniques and topping selection.
                              maki-rolls:
                                description: Rolled sushi varieties wrapped in nori seaweed including thin hosomaki, thick futomaki, and inside-out uramaki with various fillings and rolling methods.
                              sashimi-preparation:
                                description: Art of selecting, slicing, and presenting fresh raw fish and seafood without rice, emphasizing knife skills, cutting techniques, and aesthetic arrangement.
                              sushi-rice-seasoning:
                                description: Preparation of properly seasoned vinegared rice (shari) including rice variety selection, washing, cooking, and mixing with sushi vinegar, sugar, and salt.
                              sushi-accompaniments:
                                description: Essential condiments and garnishes including wasabi, soy sauce, pickled ginger, daikon radish, and shiso leaves that complement sushi and sashimi.
                          ramen:
                            description: Japanese noodle soup dishes with wheat noodles in meat or fish-based broths, topped with chashu, eggs, and nori.
                            children:
                              ramen-broth-types:
                                description: Different base broths including tonkotsu, miso, shoyu, and shio that define the fundamental flavor profile of ramen dishes.
                              ramen-regional-styles:
                                description: Distinct regional variations such as Hakata, Sapporo, and Tokyo ramen that reflect local ingredients and preferences.
                              ramen-toppings:
                                description: Specific garnishes like chashu pork, ajitsuke tamago, menma bamboo shoots, and nori that complete a ramen bowl.
                              ramen-noodle-varieties:
                                description: Wheat noodle characteristics including thickness, curl, and texture that affect the eating experience.
                              ramen-specialty-forms:
                                description: Non-traditional variations like tsukemen dipping noodles, mazemen dry noodles, and abura soba oil noodles.
                          udon-soba-noodles:
