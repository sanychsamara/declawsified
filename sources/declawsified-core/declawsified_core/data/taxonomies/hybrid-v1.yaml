                    description: Java language fundamentals including syntax, object-oriented programming, collections framework, generics, lambda expressions, and the core standard library APIs.
                  jvm-runtime:
                    description: JVM internals such as garbage collection algorithms, memory model, bytecode execution, JIT compilation, performance monitoring, and tuning tools like JVisualVM.
                  spring-framework:
