      # ---------- career-personal (NEW) ----------
      career-personal:
        description: >
          Job search, professional development, certifications, side
          hustles, networking — career things outside the current job.
        children:
          job-search:
            description: Job search strategy, postings, applications, follow-ups.
            children:
              job-sources:
                description: Discovering job openings through boards, aggregators, company career pages, social media, and professional associations, including setting up alerts and RSS feeds.
                children:
                  general-job-boards:
                    description: Major platforms like Indeed, Glassdoor, and Monster that aggregate listings across all industries and experience levels for broad-based job searches.
                  niche-specialized-boards:
                    description: Industry-specific, role-specific, or demographic-focused sites such as Dice for technology, Mediabistro for media, or FlexJobs for remote and flexible opportunities.
                  direct-company-sources:
                    description: Employer career portals and company websites where organizations post openings exclusively for their own vacancies, bypassing third-party aggregators.
                  social-professional-networks:
                    description: LinkedIn, Twitter, and Facebook used for job discovery through professional connections, company pages, industry groups, and targeted hashtags.
                  job-alert-feeds:
                    description: Automated email notifications, push alerts, and RSS feeds that deliver newly posted jobs matching specific keywords, locations, or criteria directly to candidates.
              application-tracking:
                description: Organizing and monitoring multiple job applications using spreadsheets, CRM tools, or dedicated software to track statuses, deadlines, follow-up dates, and communication history.
              job-search-strategy:
                description: Developing a targeted approach including identifying suitable roles and companies, creating a search timeline, setting daily or weekly goals, and adjusting tactics based on market response.
              recruiter-interaction:
                description: Engaging with internal and external recruiters, understanding their role, optimizing your profile for their searches, and managing communication throughout the hiring process.
              company-research:
                description: Investigating potential employers' culture, financial health, leadership, recent news, employee reviews, and business model to assess fit and prepare for applications and interviews.
              application-submission:
                description: Navigating online portals, completing application forms, uploading documents, and ensuring successful submission through technical requirements and applicant tracking systems.
          resume:
            description: Resume writing, formatting, tailoring, ATS optimization.
            children:
              ats-optimization:
                description: Strategic keyword integration, parsing-safe formatting, and technical compliance techniques designed to maximize resume compatibility with Applicant Tracking Systems and automated HR software.
              formatting-design:
                description: Visual presentation choices including template selection, typography, spacing, margins, and layout structure that enhance readability and professional appearance across digital and print formats.
              content-writing:
                description: Articulation of work experience through action-oriented bullet points, quantified accomplishments, compelling professional summaries, and skill statements that demonstrate candidate value and impact.
              tailoring-customization:
                description: Modification of resume content, keyword emphasis, and section prioritization to align with specific job descriptions, employer requirements, industry conventions, and target role expectations.
              review-feedback:
                description: Systematic evaluation processes including self-assessment, peer critique, professional resume review services, and proofreading methodologies to identify errors and strengthen overall document effectiveness.
          interview-prep:
            description: Interview practice, behavioral questions, technical interviews.
            children:
              coding-preparation:
                description: Algorithm and data structure practice for technical coding interviews including whiteboard exercises, live coding sessions, and platform-based challenges.
              behavioral-practice:
                description: STAR method and situational question preparation for demonstrating soft skills, past experiences, and cultural fit during interviews.
              system-design:
                description: High-level architecture and scalability interview preparation focusing on designing distributed systems, databases, and large-scale applications.
              mock-sessions:
                description: Live practice interviews with peers, mentors, or AI platforms to simulate real interview conditions and receive constructive feedback.
              interview-logistics:
                description: Scheduling, follow-up communications, professional attire selection, and day-of interview coordination including virtual setup and travel planning.
          salary-negotiation:
            description: Comp negotiation, counter-offers, equity discussions.
            children:
              preparation-research:
                description: Gathering market data, benchmarking compensation, assessing personal value, and researching company pay scales before entering salary discussions.
              negotiation-tactics:
                description: Specific strategies, scripts, and techniques for conducting salary conversations, including anchoring, framing, and responding to pushback.
              equity-benefits:
                description: Negotiating stock options, RSUs, bonuses, signing bonuses, and benefits packages beyond base salary compensation.
              counter-offers:
                description: Managing counter-offers from current employers or creating counter-offers for new opportunities, including timing and decision factors.
          professional-development:
            description: Skills development, conferences, workshops, mentorship.
            children:
              mentorship:
                description: Guidance on finding mentors, establishing mentor-mentee relationships, and participating in formal or informal mentorship programs to accelerate career growth.
              conferences-events:
                description: Strategies for selecting, attending, and maximizing value from industry conferences, trade shows, and professional gatherings for learning and networking.
              workshops-training:
                description: Hands-on learning opportunities including short-term workshops, corporate training programs, and intensive bootcamps for specific skill acquisition.
              online-courses:
                description: Self-paced or instructor-led digital learning programs, MOOCs, and e-learning platforms for acquiring new professional skills and credentials.
              skill-assessment:
                description: Methods for evaluating current competencies, identifying skill gaps, and creating targeted development plans aligned with career goals.
              on-the-job-training:
                description: Structured learning experiences integrated into daily work including job rotation, stretch assignments, and project-based skill development.
          certifications:
            description: Industry certifications, AWS/Azure/GCP, PMP, CFA, etc.
            children:
              cloud-platforms:
                description: Certifications for cloud computing platforms including AWS, Microsoft Azure, Google Cloud Platform, and multi-cloud architectures.
              project-management:
                description: Certifications for project management methodologies such as PMP, Agile, Scrum, PRINCE2, and Lean Six Sigma.
              finance-accounting:
                description: Certifications for financial analysis, investment management, and accounting including CFA, CPA, FRM, and ACCA.
              it-security:
                description: Certifications for information technology, cybersecurity, and networking such as CISSP, CompTIA Security+, Cisco CCNA, and CEH.
          networking:
            description: Professional networking, LinkedIn, conferences, alumni.
            children:
              linkedin-strategy:
                description: Optimizing LinkedIn profiles, content creation, and engagement tactics to build professional visibility and attract meaningful career connections.
              conferences-events:
                description: Strategic planning for professional conferences and industry events including pre-event research, real-time networking execution, and post-event relationship cultivation.
              informational-interviews:
                description: Securing, preparing for, and conducting one-on-one career conversations to gain industry insights, build relationships, and uncover hidden opportunities.
              alumni-networking:
                description: Activating school and university alumni networks through directory tools, regional events, and shared educational bonds for mentorship and career advancement.
              networking-follow-up:
                description: Systematic relationship management through CRM tools, scheduled touchpoints, and value-driven communication to convert initial meetings into lasting professional partnerships.
          side-hustle:
            description: Side businesses, freelancing, consulting on the side.
            children:
              idea-generation:
                description: Brainstorming, validating, and selecting viable side hustle concepts by analyzing personal skills, market gaps, competition, and time availability while employed full-time.
              legal-setup:
                description: Navigating business registration, licenses, insurance, contracts, and employment agreements to legally operate a side business without violating day-job policies.
              client-acquisition:
                description: Marketing, prospecting, and converting potential customers for a side hustle through digital channels, networking, and sales tactics that work with limited availability.
              time-management:
                description: Scheduling, prioritizing, and optimizing limited hours to efficiently run a side business alongside a primary career and personal responsibilities.
              financial-management:
                description: Managing side hustle income, expenses, taxes, invoicing, pricing strategies, and financial planning while complying with employment restrictions and tax obligations.
          career-transitions:
            description: Career changes, pivots, returning to work, sabbaticals.
            children:
              career-pivot:
                description: Guidance for professionals making significant industry or functional role changes, including skill translation and repositioning experience for new fields.
              returning-to-work:
                description: Support for individuals re-entering the workforce after extended absences such as parental leave, caregiving, sabbaticals, or personal health breaks.
              sabbatical-planning:
                description: Strategies for planning and executing intentional extended career breaks for personal development, travel, or skill acquisition before returning to work.
              internal-transfers:
                description: Navigating role changes, department switches, or geographic moves within your current organization without leaving the company.
              career-downshifting:
                description: Transitioning intentionally to less demanding positions, reduced hours, or lower-stress roles to improve work-life balance or accommodate life changes.
          remote-work:
            description: Remote work setup, async communication, distributed teams.
            children:
              home-office-setup:
                description: Questions about designing an ergonomic, productive home workspace including furniture, equipment, lighting, internet reliability, and creating physical boundaries between work and personal life.
              async-communication:
                description: Best practices for asynchronous communication using documentation, recorded messages, and threaded discussions to collaborate effectively across time zones without requiring simultaneous presence.
              distributed-team-collaboration:
                description: Building trust, coordinating projects, and maintaining social cohesion in teams where members are geographically dispersed and may have limited face-to-face interaction.
              remote-productivity:
                description: Personal strategies for time management, focus, boundary-setting, and avoiding burnout while working from home or flexible locations without direct supervision.
              remote-work-tools:
                description: Selection, implementation, and troubleshooting of software and hardware solutions for video conferencing, project tracking, secure access, and virtual collaboration in distributed environments.
          freelancing:
            description: Freelance contracts, clients, rates, self-employment.

            children:
              client-acquisition:
                description: Strategies for finding, attracting, and securing freelance clients through marketing, pitching, networking, and lead generation techniques.
              pricing-rates:
                description: Determining and negotiating freelance compensation structures including hourly rates, project fees, retainers, and value-based pricing.
              contracts-legal:
                description: Creating and managing freelance agreements covering scope of work, payment terms, intellectual property rights, and legal liability protection.
              financial-management:
                description: Handling freelance business finances including invoicing, expense tracking, tax compliance, accounting, and cash flow optimization.
              productivity-workflow:
                description: Managing time, projects, and boundaries as a freelancer through scheduling, tools, and systems to maintain efficiency and work-life balance.
      # ---------- learning ----------
