                description: Topics covering social gatherings, fellowship events, community service, mutual support, and the day-to-day interpersonal life of a religious congregation.
              places-of-worship:
                description: Questions about religious buildings like churches, mosques, synagogues, temples, their construction, maintenance, architecture, and accessibility for community use.
              community-governance:
                description: Inquiries about organizational structure, decision-making processes, administrative hierarchy, and institutional management within religious communities.
          spiritual-reading:
            description: Sacred texts, religious philosophy, devotional books.
            children:
              scripture-study:
                description: Sacred texts and canonical writings from world religions, including primary sources like the Bible, Quran, Torah, Vedas, and Tripitaka, studied for their original teachings and historical context.
              theological-works:
                description: Systematic religious philosophy and doctrinal analysis that interprets spiritual beliefs, explores theological concepts, and examines the intellectual foundations of faith traditions.
              devotional-literature:
                description: Daily meditation guides, spiritual reflections, and inspirational writings designed for personal contemplation, prayer support, and practical spiritual growth in everyday life.
              mystical-texts:
                description: Contemplative and esoteric writings that explore direct spiritual experience, inner transformation, and the mystical dimensions of religious traditions through poetry, allegory, and experiential accounts.
              spiritual-biography:
                description: Autobiographical and biographical accounts of spiritual leaders, saints, and mystics that document their personal journeys, struggles, and insights into the spiritual path.
          philosophy:
            description: Philosophy, ethics, meaning of life, philosophical study.
            children:
              existential-questions:
                description: Exploring questions of meaning, purpose, freedom, mortality, and the human condition from a philosophical perspective.
              moral-ethics:
                description: Investigating principles of right and wrong, virtue, justice, and ethical frameworks for spiritual and personal conduct.
              metaphysical-inquiry:
                description: Questioning the nature of reality, consciousness, existence, causality, and the soul beyond physical observation.
              philosophical-traditions:
                description: Studying major philosophical schools and systems including Stoicism, Existentialism, Eastern philosophy, and their spiritual applications.
              contemplative-practice:
                description: Engaging in philosophical meditation, reflection, journaling, and critical thinking as active spiritual disciplines.
              suffering-meaning:
                description: Examining philosophical responses to pain, evil, and injustice, including theodicy, absurdism, and finding meaning in hardship.
          rituals:
            description: Rituals, holidays, observances, religious calendar.

            children:
              life-cycle-rituals:
                description: Rituals marking personal transitions such as birth ceremonies, coming-of-age rites, weddings, funerals, and other milestones that structure human life.
              seasonal-celebrations:
                description: Holidays and festivals tied to astronomical events like solstices and equinoxes, agricultural cycles, or fixed calendar dates that recur annually.
              daily-weekly-practices:
                description: Regular, recurring spiritual disciplines such as daily prayer schedules, Sabbath observance, meditation routines, and weekly worship services.
              initiation-rites:
                description: Ceremonies marking formal entry into religious communities, spiritual orders, or new levels of practice, including baptisms, ordinations, and initiations.
              remembrance-observances:
                description: Rituals honoring deceased ancestors, commemorating historical religious events, or observing memorial days and days of mourning.
      # ---------- community-service (NEW) ----------
      community-service:
        description: >
          Volunteering, activism, donations, civic engagement, mutual
          aid, community organizing.
        children:
          volunteering:
            description: Volunteering hours, organizations, causes.
            children:
              finding-opportunities:
                description: Users searching for volunteer roles and opportunities that match their interests, availability, and location, including how to get started with volunteering.
              logging-hours:
                description: Users needing to track, record, verify, or report volunteer hours for academic requirements, workplace programs, scholarships, or personal records.
              cause-areas:
                description: Users interested in volunteering for specific causes or issue areas such as environmental protection, education, poverty relief, animal welfare, or social justice.
              skills-based:
                description: Users wanting to volunteer their professional skills in pro bono roles or develop new abilities through skill-specific volunteer work.
              event-volunteering:
                description: Users looking for one-time, short-term, or special event volunteer opportunities rather than ongoing or long-term commitments.
          activism:
            description: Political activism, advocacy, organizing.
            children:
              protest-organizing:
                description: Planning and executing demonstrations, marches, and direct action events to publicly advocate for political or social change.
              policy-advocacy:
                description: Lobbying legislators, drafting policy proposals, and engaging with government institutions to influence laws and regulations.
              grassroots-mobilization:
                description: Building bottom-up community movements by recruiting volunteers, developing local leadership, and coordinating decentralized campaigns.
              digital-activism:
                description: Using social media, online platforms, and digital tools to organize campaigns, spread messages, and mobilize supporters virtually.
              awareness-campaigns:
                description: Creating educational initiatives, public messaging, and media strategies to inform the public and shift opinions on social or political issues.
          donations:
            description: Charitable giving, donor advised funds, year-end giving.
            children:
              cash-donations:
                description: Direct monetary contributions to charitable organizations via one-time gifts, recurring payments, checks, or digital platforms, forming the most common type of charitable donation.
              in-kind-donations:
                description: Non-monetary charitable gifts of physical goods, supplies, equipment, or professional services provided directly to organizations instead of cash.
              donor-advised-funds:
                description: Charitable giving vehicles managed by sponsoring organizations where donors make irrevocable contributions, receive immediate tax deductions, and recommend grants to nonprofits over time.
              employer-matching:
                description: Workplace benefit programs that match employee charitable donations, often doubling contributions through payroll deductions and corporate giving initiatives.
              planned-giving:
                description: Long-term charitable contributions integrated into estate planning, including bequests, charitable remainder trusts, and beneficiary designations to support causes after death.
          civic-engagement:
            description: Voting, town halls, civic participation, local government.
            children:
              voting-procedures:
                description: Information about voter registration, polling locations, absentee ballots, early voting, and election day procedures for participating in elections at any level.
              local-government:
                description: Interaction with municipal institutions including city council meetings, mayor's office, local agencies, zoning boards, and neighborhood-specific government services.
              public-meetings:
                description: Attending or participating in town halls, public hearings, community forums, and official comment periods where citizens engage with decision-makers.
              civic-education:
                description: Learning about governmental structures, democratic processes, citizen rights and responsibilities, and how to effectively participate in civic life.
              petitioning:
                description: Creating, signing, or promoting official petitions, ballot initiatives, and signature campaigns to influence policy or trigger governmental action.
          mutual-aid:
            description: Mutual aid networks, neighbor help, community support.

            children:
              local-networks:
                description: Geographically-based community groups that coordinate neighbor-to-neighbor assistance and support within specific towns or neighborhoods.
              online-platforms:
                description: Digital tools, apps, and social media groups that connect people offering and requesting mutual aid resources across wider areas.
              resource-swapping:
                description: Direct exchange of physical goods, professional skills, and services between community members without monetary compensation.
              disaster-response:
                description: Community-organized emergency assistance during crises like natural disasters, pandemics, or economic disruptions.