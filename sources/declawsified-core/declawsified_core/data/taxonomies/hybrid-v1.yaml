                  jakarta-ee:
                    description: Jakarta EE specifications, application servers, and enterprise Java standards beyond the Spring ecosystem.
                  reactive-programming:
                    description: Reactive programming models in Java using RxJava, Project Reactor, Vert.x, and asynchronous stream processing.
                  concurrency-parallelism:
                    description: Java concurrency utilities, multithreading, the java.util.concurrent package, and parallel computing patterns.
                  data-access:
                    description: Database connectivity in Java including JDBC, JPA, Hibernate, Spring Data, and ORM patterns.
                  cloud-native:
                    description: Cloud-native Java development, microservices architecture, containerization, Kubernetes, and service mesh integration.
                  application-security:
                    description: Java security frameworks, authentication and authorization mechanisms, Spring Security, OAuth2, and JWT implementation.
              csharp:
                description: C#, .NET, ASP.NET, Entity Framework.
                children:
                  dotnet-runtime-sdk:
                    description: Questions about .NET runtime internals, SDK version management, CLI tooling, cross-platform deployment, application hosting, and runtime configuration for C# applications.
                  aspnet-core:
                    description: Web development with ASP.NET Core including MVC architecture, Razor Pages, Web APIs, middleware components, routing systems, authentication flows, and authorization policies.
                  entity-framework-core:
                    description: Database access and object-relational mapping using Entity Framework Core, covering LINQ to Entities, code-first migrations, model configuration, change tracking, and database provider selection.
                  csharp-language:
                    description: C# language syntax, features, and idioms including async/await patterns, LINQ syntax, generic constraints, pattern matching, nullable reference types, and version-specific enhancements.
                  desktop-ui-frameworks:
