                children:
                  memory-management:
                    description: Covers RAII, smart pointers, custom allocators, memory pools, and resource lifetime management patterns specific to C++.
                  templates-metaprogramming:
                    description: Encompasses generic programming, template specialization, SFINAE, concepts, and compile-time computation techniques in C++.
                  concurrency-parallelism:
                    description: Focuses on multi-threading, synchronization primitives, atomics, memory models, and parallel algorithms in modern C++.
                  standard-library:
                    description: Deals with STL containers, algorithms, iterators, ranges, functional utilities, and the core library facilities of C++.
                  build-toolchain:
                    description: Addresses CMake configuration, compilation flags, linking issues, package management with vcpkg/conan, and build system integration.
              swift:
                description: Swift language, iOS, Apple platform development.
                children:
                  ios-development:
                    description: iOS application development using Swift, covering UIKit and SwiftUI frameworks, app lifecycle, navigation, data persistence, App Store distribution, and mobile-specific APIs like camera, location, and push notifications.
                  swift-language:
                    description: The Swift programming language itself, including syntax, type system, optionals, protocols, generics, error handling, memory management, concurrency with async/await and actors, and the standard library.
                  swiftui:
                    description: SwiftUI framework for building declarative user interfaces across Apple platforms, including views, state management with @State and @Observable, data binding, navigation, and integration with UIKit.
                  macos-development:
                    description: macOS application development using Swift, encompassing AppKit, Mac-specific UI components, menu bar apps, document-based applications, and desktop platform integration.
                  server-side-swift:
                    description: Backend development with Swift using frameworks like Vapor or Hummingbird, including HTTP servers, routing, database integration, authentication, and deploying Swift services.
              kotlin:
                description: Kotlin, JVM and Android, coroutines.
                children:
                  android-development:
                    description: Kotlin usage for Android app development including Jetpack libraries, Android SDK integration, and mobile-specific patterns.
                  coroutines-async:
                    description: Kotlin coroutines, Flow, channels, and asynchronous programming models for concurrent and non-blocking code.
                  jvm-backend:
                    description: Server-side Kotlin development with frameworks like Spring Boot, Ktor, and JVM-based backend services.
                  language-features:
                    description: Core Kotlin language syntax, type system, null safety, extension functions, and standard library usage.
                  java-interop:
                    description: Interoperability between Kotlin and Java codebases, calling Java from Kotlin and vice versa, and mixed-language projects.
              ruby:
                description: Ruby language, Rails, gems, metaprogramming.
                children:
                  rails-development:
                    description: Building web applications with Ruby on Rails, including MVC patterns, routing, ActiveRecord, ActionController, views, and Rails conventions.
                  gem-authoring:
                    description: Creating and publishing reusable Ruby libraries as gems, managing gemspec files, versioning, and distribution through RubyGems.
                  metaprogramming-patterns:
                    description: Dynamic code generation, DSL construction, method_missing usage, monkey patching, and runtime class modification techniques.
                  testing-practices:
                    description: RSpec, Minitest, and Cucumber for unit, integration, and acceptance testing, plus mocking, stubbing, and test-driven development workflows.
                  performance-tuning:
                    description: Profiling Ruby applications, optimizing memory allocation, reducing GC pressure, and improving execution speed through code refactoring.
          testing:
            description: >
              Software testing, test automation, QA, test strategy,
              property-based testing, integration tests.
            children:
              unit-testing:
                description: Unit tests, test isolation, mocks, fixtures.
                children:
                  mocks-stubs-fakes:
                    description: Questions about implementing and differentiating between mocks, stubs, fakes, and spies for isolating dependencies in unit tests.
                  test-fixtures:
                    description: Strategies for creating, managing, and reusing test data and setup/teardown logic in unit tests.
                  test-coverage:
                    description: Determining optimal coverage levels, interpreting coverage metrics, and using coverage tools for unit test suites.
                  tdd-practices:
                    description: Applying test-driven development principles including red-green-refactor cycles and test-first approaches to unit testing.
                  test-maintainability:
                    description: Refactoring unit tests, reducing brittleness, and keeping tests clean as production code evolves.
              integration-testing:
                description: Integration tests, end-to-end, contract testing.
                children:
                  contract-testing:
                    description: Consumer-driven verification that service providers adhere to explicit API contracts, typically using tools like Pact or Spring Cloud Contract, focusing on message formats and interaction patterns without deploying full systems.
                  end-to-end-testing:
                    description: Testing complete user journeys across multiple integrated systems and services in production-like environments to validate business workflows from start to finish.
                  api-integration:
                    description: Testing synchronous communication between services through HTTP-based interfaces like REST, GraphQL, or gRPC to verify endpoint functionality, data serialization, and status codes.
                  messaging-integration:
                    description: Testing asynchronous integrations via message brokers and event streams such as Kafka, RabbitMQ, or AWS SQS to validate message schemas, ordering guarantees, and eventual consistency across decoupled services.
                  third-party-integration:
                    description: Testing interactions with external systems, SaaS APIs, payment gateways, or cloud services where the system under test depends on outside components that cannot be fully controlled or mocked.
              property-based:
                description: Property-based testing, fuzz testing, hypothesis.
                children:
                  generation-strategies:
                    description: Methods for generating test inputs including random, exhaustive, and targeted strategies, plus configuration of generators, distributions, size parameters, and custom data generation for property-based tests.
                  shrinking:
                    description: Automatic reduction of failing test cases to minimal counterexamples that still break properties, including shrinking strategies for complex data structures and integration with debugging workflows.
                  property-definition:
                    description: Writing and structuring properties, invariants, preconditions, postconditions, and metamorphic relations that accurately specify expected behavior for property-based testing.
                  stateful-testing:
                    description: Modeling and testing stateful systems through sequences of operations, state machines, and verifying properties hold across state transitions and mutable data.
              load-testing:
                description: Load tests, stress tests, k6, JMeter, performance baselines.
                children:
                  tools:
                    description: Evaluation, configuration, and troubleshooting of load testing tools such as k6, JMeter, Gatling, and Locust, including their scripting languages and plugin ecosystems.
                  test-types:
                    description: Methodologies for stress testing, spike testing, soak testing, and breakpoint analysis to determine system limits and behavior under extreme load patterns.
                  metrics-analysis:
                    description: Interpretation of throughput, latency, error rates, and resource utilization metrics to establish performance baselines and identify system bottlenecks.
                  scripting-scenarios:
                    description: Creation of realistic user workflows, request parameterization, session handling, and data-driven test scenario design for accurate load simulation.
                  infrastructure-setup:
                    description: Configuration of load injector clusters, test environment isolation, network bandwidth planning, and cloud resource provisioning for large-scale distributed tests.
              test-strategy:
                description: Test pyramid, test plans, coverage strategy, QA processes.
                children:
                  test-pyramid:
                    description: Designing the optimal ratio of unit, integration, and end-to-end tests to balance speed, cost, and confidence in the testing suite.
                  test-planning:
                    description: Creating comprehensive roadmaps that define testing scope, timelines, resources, and milestones for projects or releases.
                  coverage-strategy:
                    description: Determining which code paths, features, and scenarios to test and setting target metrics for unit, integration, and system coverage.
                  qa-processes:
                    description: Establishing workflows, quality gates, review procedures, and release criteria to ensure consistent testing practices across teams.
                  risk-based-testing:
                    description: Prioritizing testing efforts by assessing the likelihood and impact of potential failures to allocate resources efficiently.
          machine-learning:
            description: >
              ML engineering, model training, MLOps, deep learning,
              feature engineering, model deployment.
            children:
              training:
                description: Model training, hyperparameter tuning, datasets, GPUs.
                children:
                  hyperparameter-optimization:
                    description: Systematic search strategies including grid search, random search, and Bayesian optimization to find optimal values for learning rate, batch size, and other training hyperparameters.
                  distributed-training:
                    description: Parallelizing model training across multiple GPUs or nodes using data parallelism, model parallelism, and frameworks like Horovod or DeepSpeed to scale to large models and datasets.
                  data-loading-pipeline:
                    description: Efficiently feeding training data via optimized dataloaders, preprocessing, augmentation, batching, and handling memory constraints for large-scale datasets.
                  training-loop-implementation:
                    description: Implementing the core training iteration with forward/backward passes, gradient accumulation, optimizer steps, and framework-specific patterns in PyTorch, TensorFlow, or JAX.
                  regularization-techniques:
                    description: Applying dropout, weight decay, early stopping, batch normalization, and data augmentation during training to improve generalization and prevent overfitting.
              mlops:
                description: ML pipelines, model registries, deployment, monitoring drift.
                children:
                  model-deployment:
                    description: Serving models in production via APIs, batch inference, or edge devices, managing endpoints, autoscaling, A/B testing, and canary deployments for live prediction traffic.
                  pipeline-orchestration:
                    description: Building and managing automated ML workflows that chain data ingestion, feature engineering, training, validation, and deployment steps using tools like Airflow, Kubeflow, or Prefect.
                  model-monitoring:
                    description: Continuously tracking model performance metrics, data drift, concept drift, prediction latency, and error rates in production to trigger alerts and retraining pipelines.
                  model-registry:
                    description: Centralized catalog for versioning, storing, and governing trained models, experiment metadata, and artifacts throughout their lifecycle from staging to production to archived.
                  ml-infrastructure:
                    description: Provisioning and managing compute resources, containers, GPU/TPU allocation, environment reproducibility, and CI/CD automation specifically for machine learning systems.
              deep-learning:
                description: Neural networks, transformers, PyTorch, TensorFlow.
                children:
                  neural-architectures:
                    description: Design patterns and building blocks for neural networks including CNNs, RNNs, attention mechanisms, and autoencoders, covering layer composition and connectivity strategies.
                  computer-vision:
                    description: Deep learning applications for image and video analysis including classification, object detection, segmentation, and vision transformers, focusing on visual data processing.
                  sequence-modeling:
                    description: Modeling sequential data with deep learning for time series, speech recognition, and general NLP tasks using RNNs, LSTMs, and attention (excluding large language models).
                  generative-models:
                    description: Creating synthetic data through GANs, VAEs, diffusion models, and normalizing flows, covering architecture design and training objectives for generation tasks.
                  deep-learning-frameworks:
                    description: Implementation details and APIs for PyTorch, TensorFlow, JAX, and Keras including tensor operations, automatic differentiation, and model serialization.
                  model-interpretability:
                    description: Techniques for understanding neural network decisions through attention visualization, saliency maps, feature attribution, and activation analysis.
              llm-engineering:
                description: LLM application engineering, prompts, RAG, fine-tuning, agents.
                children:
                  prompt-engineering:
                    description: Designing, optimizing, and structuring input prompts to elicit accurate, relevant, and consistent responses from language models while managing token limits and context.
                  rag-systems:
                    description: Building retrieval-augmented generation pipelines that combine document search, vector databases, and chunking strategies with LLMs to ground responses in external knowledge.
                  fine-tuning:
                    description: Adapting pre-trained language models on domain-specific datasets using techniques like LoRA, QLoRA, or full fine-tuning to improve performance for specialized tasks.
                  agent-development:
                    description: Creating autonomous systems that use LLMs for planning, tool invocation, memory management, and multi-step reasoning to accomplish complex goals.
                  evaluation-monitoring:
                    description: Implementing benchmarks, metrics, and observability tools to assess LLM output quality, latency, cost, and drift in production environments.
                  deployment-serving:
                    description: Managing model serving infrastructure, scaling, batching, quantization, and API design for cost-effective and low-latency LLM inference.
                  safety-alignment:
                    description: Applying techniques like RLHF, constitutional AI, and content filtering to mitigate hallucinations, bias, jailbreaks, and ensure model behavior aligns with human values.
              feature-engineering:
                description: Feature stores, feature engineering, data preparation.

                children:
                  feature-extraction:
                    description: Methods for deriving new predictive attributes from raw data sources such as text, images, audio, or log files through techniques like TF-IDF, edge detection, or spectrogram analysis.
                  feature-selection:
                    description: Techniques for identifying and retaining the most informative variables while eliminating redundant or irrelevant features to improve model performance and reduce complexity.
                  feature-transformation:
                    description: Processes for converting raw features into suitable representations for machine learning algorithms, including scaling, normalization, encoding categorical variables, and handling missing values.
                  feature-stores:
                    description: Centralized systems that manage the storage, versioning, discovery, and serving of engineered features to ensure consistency between model training and production inference.
                  temporal-feature-engineering:
                    description: Creation of time-dependent features such as rolling windows, lags, trends, and seasonality indicators for forecasting and sequential data analysis.
      # ---------- research ----------
      research:
        description: >
          Research, investigation, analysis, literature review, scientific
          experiments, data gathering, systematic study.
        children:
          scientific:
            description: Lab experiments, hypotheses, measurements, peer-reviewed methodology.
            children:
              experimental-design:
                description: Planning and structuring scientific studies including hypothesis formulation, control groups, variable selection, sample size calculations, and replication strategies to ensure valid and reliable results.
              laboratory-protocols:
                description: Documented procedures for conducting experiments, operating equipment, handling samples, maintaining safety standards, and ensuring reproducibility in wet-lab or dry-lab environments.
              data-acquisition:
                description: The process of collecting raw measurements, observations, and instrument readings from experiments, including calibration, metadata recording, and quality control procedures.
              peer-review-publication:
                description: Preparing research manuscripts, selecting appropriate journals, navigating submission systems, responding to reviewer critiques, and managing the publication process for scientific findings.
              research-compliance:
                description: Obtaining ethical approvals, adhering to safety regulations, managing biosafety protocols, ensuring animal welfare compliance, and meeting institutional and funding agency requirements.
          market:
            description: Market research, customer interviews, surveys, industry trends.
            children:
              customer-interviews:
                description: Conducting qualitative, one-on-one conversations with target buyers to explore purchasing motivations, unmet needs, and decision criteria for market opportunity identification.
              surveys:
                description: Deploying standardized questionnaires to statistically significant samples to measure market size, customer satisfaction, or demand patterns at scale.
              industry-trends:
                description: Tracking and interpreting broad market movements, technological disruptions, and sector-wide shifts to anticipate future opportunities and competitive landscapes.
              market-segmentation:
                description: Dividing heterogeneous markets into homogeneous customer clusters based on shared characteristics to optimize targeting and positioning strategies.
              pricing-research:
                description: Analyzing customer price sensitivity, competitive benchmarks, and value perception to establish optimal pricing structures and maximize revenue.
          academic:
            description: Academic papers, literature reviews, citations, scholarly references.
            children:
              literature-search:
                description: Finding and discovering academic papers using specialized databases like PubMed, IEEE Xplore, and Google Scholar, including constructing effective search queries and using advanced filtering techniques.
              citation-management:
                description: Organizing, storing, and formatting bibliographic references using tools such as Zotero, Mendeley, or EndNote, including creating bibliographies and managing in-text citations across documents.
              paper-analysis:
                description: Reading, interpreting, and critically evaluating academic papers by understanding their structure, methodology, statistical analysis, results, and conclusions to assess validity and relevance.
              literature-synthesis:
                description: Conducting comprehensive literature reviews, systematic reviews, and meta-analyses to synthesize findings, identify research gaps, and aggregate evidence across multiple scholarly sources.
              source-verification:
                description: Verifying the authenticity and credibility of academic sources by checking peer-review status, identifying predatory journals, assessing impact factors, and confirming author credentials.
          data-analysis:
            description: Statistical analysis, EDA, hypothesis testing, dashboards.
            children:
              exploratory-data-analysis:
                description: Initial investigation of datasets through visualization and summary statistics to uncover patterns, anomalies, and relationships before formal modeling.
              statistical-modeling:
                description: Building mathematical models including regression, time series, and multivariate analysis to quantify relationships and make inferences from data.
              hypothesis-testing:
                description: Designing and executing controlled experiments with A/B tests, t-tests, and p-values to validate or reject specific business or research hypotheses.
              dashboards-reporting:
                description: Creating interactive business intelligence dashboards, automated reports, and KPI tracking systems for ongoing performance monitoring.
              data-preprocessing:
                description: Cleaning, transforming, normalizing, and feature engineering raw data to prepare it for analysis, including handling missing values and outliers.
              predictive-analytics:
                description: Developing forecasting models and machine learning classifiers to predict future outcomes based on historical patterns and trends.
          competitive-intelligence:
            description: Competitor analysis, feature comparison, win/loss reviews.
            children:
              competitor-tracking:
                description: Monitoring specific competitors' activities, announcements, and strategic moves to stay informed of their market actions.
              feature-matrix:
                description: Creating and maintaining detailed comparisons of product capabilities, specifications, and feature parity across competitive offerings.
              win-loss-analysis:
                description: Systematic review of sales outcomes to understand why deals were won or lost against specific competitors and identify patterns.
              pricing-strategy:
                description: Analysis of competitor pricing models, discounting practices, packaging approaches, and overall pricing positioning in the market.
              market-positioning:
                description: Understanding how competitors differentiate themselves through messaging, target segments, brand perception, and go-to-market strategies.
          ux-research:
            description: User interviews, usability testing, journey mapping.
            children:
              usability-testing:
                description: Evaluates product usability by observing users attempting specific tasks, measuring completion rates, time-on-task, errors, and satisfaction to identify interaction problems.
              user-interviews:
                description: Conducts one-on-one conversational sessions to explore user behaviors, motivations, pain points, and needs through open-ended qualitative questioning and probing.
              journey-mapping:
                description: Creates visual representations of the end-to-end user experience across all touchpoints to identify friction points, emotional responses, and opportunities for design improvement.
              information-architecture:
                description: Researches how users categorize, label, and navigate content using card sorting and tree testing to optimize the findability and structure of digital products.
              surveys-feedback:
                description: Collects quantitative and qualitative data at scale through structured questionnaires to measure user attitudes, satisfaction, and usage patterns across larger populations.
          policy-research:
            description: Policy analysis, regulatory landscape, white papers.

      # ---------- legal ----------
      legal:
        description: >
          Legal work: contracts, compliance, intellectual property,
          regulatory matters, dispute resolution, corporate transactions.
        children:
          contracts:
            description: Contract drafting, review, negotiation, vendor agreements, ToS.
            children:
              drafting:
                description: Creating contract templates and bespoke agreements from scratch with appropriate clauses, terms, and legal language.
              review:
                description: Analyzing executed or proposed contracts to identify legal risks, obligations, compliance gaps, and unfavorable terms.
              negotiation:
                description: Strategies and tactics for negotiating pricing, liabilities, deliverables, and conditions with contract counterparties.
              vendor-agreements:
                description: Contracts with suppliers, service providers, and third-party vendors covering procurement, service levels, and outsourcing relationships.
              terms-of-service:
                description: User-facing agreements including Terms of Service, EULAs, and privacy policies for websites, apps, and digital platforms.
              contract-management:
                description: Post-execution lifecycle management including performance monitoring, amendments, renewals, terminations, and breach remediation.
          compliance:
            description: GDPR, HIPAA, SOC2, regulatory compliance, audit trails.
            children:
              frameworks-standards:
                description: Implementation and management of formal compliance frameworks such as SOC2, ISO 27001, NIST, and FedRAMP, including control mapping, gap analysis, and continuous monitoring requirements.
              industry-regulations:
                description: Adherence to sector-specific mandates like HIPAA for healthcare data, PCI-DSS for payment processing, FINRA for securities, and FERPA for education, including regulatory reporting obligations.
              audit-certification:
                description: Planning and executing compliance audits, managing auditor relationships, collecting evidence, tracking findings, and maintaining certifications across multiple frameworks.
              risk-assessment:
                description: Identifying compliance gaps, evaluating control effectiveness, conducting impact assessments, and implementing remediation programs to mitigate regulatory risk.
              policy-documentation:
                description: Creating, approving, and maintaining compliance policies, procedures, standards, and audit trail documentation with version control and attestation workflows.
          patents:
            description: Patent drafting, filing, prior-art search, claims.
            children:
              prosecution:
                description: The process of preparing and filing patent applications and navigating examination before patent offices, including drafting specifications, responding to office actions, and prosecuting claims to allowance.
              search-and-analytics:
                description: Conducting prior art searches for patentability and validity opinions, analyzing patent landscapes, performing freedom-to-operate studies, and generating competitive intelligence from patent data.
              litigation-and-post-grant:
                description: Patent infringement litigation in court, post-grant proceedings before the PTAB including inter partes review, and enforcement strategies for asserting or defending patent rights.
              licensing-and-transactions:
                description: Negotiating and drafting patent licenses, assignments, and other agreements, conducting patent due diligence for M&A and financing, and valuing patent assets for commercial transactions.
              portfolio-strategy:
                description: Strategic management of patent portfolios including maintenance decisions, annuity payments, competitive monitoring, portfolio optimization, and aligning patent strategy with business objectives.
          trademarks:
            description: Trademark registration, brand protection, opposition.
            children:
              opposition-cancellation:
                description: Managing administrative proceedings to challenge or defend trademark registrations before intellectual property offices, including opposition, cancellation, and invalidation actions.
              infringement-enforcement:
                description: Protecting trademark rights against unauthorized use through monitoring, cease and desist letters, takedown notices, and litigation in courts.
              registration-prosecution:
                description: Filing and prosecuting trademark applications from initial filing through examination, responding to office actions, and securing registration.
              search-clearance:
                description: Conducting comprehensive trademark searches and analyzing results to assess availability, infringement risks, and registrability before filing.
          copyright:
            description: Copyright, licensing, fair use, DMCA.
            children:
              registration-and-ownership:
                description: Covers copyright registration procedures, ownership determination, work-for-hire doctrines, and joint authorship arrangements.
              licensing-and-permissions:
                description: Covers licensing frameworks, permission grants, royalty structures, open-source licenses, and Creative Commons mechanisms for copyrighted material.
              fair-use-exceptions:
                description: Covers fair use analysis, statutory limitations, educational exceptions, parody protection, and public domain identification.
              digital-copyright:
                description: Covers DMCA takedown procedures, online infringement, safe harbor protections, and digital rights management under copyright law.
          litigation:
            description: Litigation, disputes, depositions, discovery, settlements.
            children:
              discovery:
                description: Discovery process including e-discovery, document requests, interrogatories, and production of electronically stored information.
              depositions:
                description: Taking, defending, and preparing for witness depositions including notice procedures and transcript management.
              motions:
                description: Drafting, filing, and responding to pre-trial motions such as motions to dismiss, for summary judgment, or to compel discovery.
              settlement:
                description: Negotiating settlement agreements, structuring deals, mediation procedures, and release terms to resolve disputes before or during trial.
              trial:
                description: Trial preparation, courtroom strategy, jury selection, witness examination, and post-trial motions.
          m-and-a:
            description: Mergers and acquisitions, due diligence, deal structure.
          employment-law:
            description: Employment contracts, NDAs, non-competes, severance.
            children:
              hiring-recruitment:
                description: Questions about job offers, background checks, interview practices, pre-employment screening, and hiring discrimination compliance.
              wage-hour:
                description: Disputes over minimum wage, overtime eligibility, meal and rest breaks, timekeeping accuracy, and employee classification as exempt or non-exempt.
              discrimination-harassment:
                description: Allegations of workplace discrimination based on protected characteristics, sexual harassment, hostile work environment, and retaliation for protected activities.
              termination-separation:
                description: Issues involving wrongful termination, constructive discharge, layoff compliance, severance negotiations, and final wage payment requirements.
          privacy:
            description: Privacy policies, data subject rights, cross-border transfers.

            children:
              data-protection-laws:
                description: Covers specific privacy regulations including GDPR, CCPA, LGPD, PIPEDA, and their jurisdictional requirements, compliance obligations, and legal interpretations.
              data-subject-requests:
                description: Focuses on processing individual rights requests such as access, rectification, erasure, data portability, and objection under privacy laws.
              cross-border-transfers:
                description: Addresses mechanisms for international data transfers including Standard Contractual Clauses, Binding Corporate Rules, adequacy decisions, and transfer impact assessments.
              breach-notification:
                description: Handles data breach incident response, assessment, notification timelines, regulatory reporting, and remediation strategies.
              privacy-governance:
                description: Encompasses privacy policies, privacy impact assessments, organizational accountability, training programs, and vendor management.
      # ---------- finance (corporate) ----------
      finance:
        description: >
          Corporate finance: accounting, financial planning, treasury,
          audit, tax, investor relations.
        children:
          accounting:
            description: General ledger, journal entries, AP/AR, close process.
            children:
              gl-management:
                description: Chart of accounts design, GL structure maintenance, posting rules, and financial data integrity for the general ledger.
              ap-invoicing:
                description: Vendor invoice processing, three-way matching, payment runs, vendor master data, and accounts payable workflow management.
              ar-collections:
                description: Customer billing, credit management, cash application, collections, and accounts receivable aging analysis.
              month-end-close:
                description: Period-end closing procedures, account reconciliations, journal entry approvals, accruals, and financial statement preparation.
              fixed-assets:
                description: Asset capitalization, depreciation calculations, impairment testing, asset disposals, and maintenance of fixed asset registers.
              intercompany:
                description: Intercompany transaction processing, balancing entries, elimination accounting, transfer pricing, and consolidation support.
          fp-and-a:
            description: Financial planning and analysis, budgeting, forecasting, variance.
            children:
              budgeting:
                description: Annual budget creation, budget cycle management, departmental allocation, consolidation, and maintenance of the official financial plan.
              forecasting:
                description: Rolling financial forecasts, predictive modeling, scenario planning, and periodic re-forecasting based on actual performance and market changes.
              variance-analysis:
                description: Investigation and reporting of differences between actual financial results and budgeted or forecasted figures, including root cause analysis and corrective actions.
              management-reporting:
                description: Preparation of financial dashboards, KPI tracking, board presentations, and executive-level performance reports for strategic decision-making.
              financial-modeling:
                description: Construction of dynamic financial models for scenario analysis, sensitivity testing, what-if planning, and supporting strategic business decisions.
          treasury:
            description: Cash management, banking relationships, FX, working capital.
            children:
              cash-forecasting:
                description: Predicting future cash inflows and outflows to ensure adequate liquidity for operational needs and strategic initiatives.
              bank-relationship-management:
                description: Negotiating banking services, managing account structures, monitoring fees, and maintaining strategic partnerships with financial institutions.
              fx-risk-management:
                description: Identifying, measuring, and hedging currency exposure from international operations to protect against foreign exchange volatility.
              working-capital-optimization:
                description: Managing accounts receivable, accounts payable, and inventory levels to minimize tied-up capital while maintaining operational efficiency.
              debt-capital-management:
                description: Structuring and managing credit facilities, loans, and debt instruments to optimize cost of capital and maintain financial flexibility.
          audit:
            description: Internal and external audit, controls, compliance testing.
            children:
              internal-audit:
                description: Covers internal audit department operations, risk-based audit planning, operational audits, internal control testing, and coordination with audit committees for governance oversight.
              external-audit:
                description: Manages relationships with independent external auditors, coordinates financial statement audits, reviews audit findings, and oversees the annual audit process and auditor selection.
              sox-controls:
                description: Focuses on Sarbanes-Oxley Act compliance, including design and testing of internal controls over financial reporting (ICFR), Section 404 certifications, and documentation of control deficiencies.
              regulatory-audit:
                description: Addresses compliance audits for non-SOX regulations such as banking regulations, insurance oversight, industry-specific requirements, and regulatory examination preparation.
              it-audit:
                description: Specializes in auditing information technology general controls, application controls, cybersecurity frameworks, data privacy compliance, and system implementation reviews.
          tax-corp:
            description: Corporate tax planning, returns, transfer pricing, R&D credits.
            children:
              compliance-filing:
                description: Corporate income tax return preparation, estimated payments, and statutory filing requirements across federal, state, and local jurisdictions.
              strategic-planning:
                description: Proactive tax structuring, entity organization, and transaction design to minimize corporate tax liability while ensuring business objectives are met.
              transfer-pricing:
                description: Intercompany transaction pricing, documentation preparation, and compliance with arm's length principles and OECD BEPS guidelines.
              credits-incentives:
                description: Identification, qualification, and optimization of R&D tax credits, investment tax credits, and other corporate tax incentives.
              international-tax:
                description: Cross-border tax issues including foreign tax credits, repatriation strategies, permanent establishment risk, and global effective tax rate management.
          investor-relations:
            description: Earnings calls, investor communications, board reporting.
            children:
              earnings-calls:
                description: Quarterly earnings call preparation, execution, transcript management, and analyst Q&A coordination.
              financial-filings:
                description: SEC filings, annual/quarterly reports, 8-K disclosures, and regulatory document preparation and distribution.
              investor-presentations:
                description: Slide deck creation, roadshow materials, investor day content, and visual storytelling for investment community.
              shareholder-engagement:
                description: Proxy voting, annual meetings, dividend communications, and direct shareholder correspondence.
              analyst-relations:
                description: Sell-side and buy-side analyst outreach, guidance strategies, consensus management, and research relationship maintenance.
          procurement-finance:
            description: Vendor payments, expense reports, P-cards, spend management.

      # ---------- hr / people ----------
      hr:
        description: >
          People operations: hiring, employee relations, performance,
          compensation, learning and development, culture.
        children:
          recruiting:
            description: Sourcing, interviewing, ATS, hiring panels, offer process.
            children:
              sourcing:
                description: Finding and attracting potential candidates through channels like job boards, social media, employee referrals, direct outreach, and recruitment marketing campaigns.
              applicant-tracking:
                description: Managing candidate pipelines, resume databases, application workflows, and communication touchpoints using an ATS or similar recruitment software.
              interviewing:
                description: Designing assessment processes, conducting phone screens, technical evaluations, behavioral interviews, and coordinating interview schedules with candidates.
              hiring-panels:
                description: Organizing interviewers, collecting structured feedback, facilitating calibration discussions, and driving consensus-based hiring decisions among stakeholders.
              offer-management:
                description: Creating compensation packages, obtaining approvals, presenting offers to candidates, negotiating terms, and managing the acceptance and pre-boarding process.
              job-requisition:
                description: Defining role requirements, obtaining headcount approval, writing job descriptions, establishing hiring criteria, and launching new positions for recruitment.
          onboarding:
            description: New-hire onboarding, ramp plans, buddy systems.
            children:
              paperwork-and-compliance:
                description: Collection and processing of new-hire documents, legal forms, policy acknowledgments, and regulatory requirements for employment eligibility.
              buddy-and-mentorship:
                description: Assignment and guidance of onboarding buddies or mentors who provide peer support, answer questions, and facilitate social integration for new hires.
              ramp-plan-and-timeline:
                description: Structured 30-60-90 day plans, onboarding milestones, role-specific learning paths, and performance expectations during the initial months.
              tech-setup-and-access:
                description: Provisioning of hardware, software accounts, system permissions, security credentials, and IT support needed for new hires to be productive.
              first-day-logistics:
                description: Orientation schedules, workplace access, welcome activities, initial introductions, and practical arrangements for a new hire's first day or week.
          compensation:
            description: Salary bands, equity, bonuses, comp reviews.
            children:
              salary-bands:
                description: Questions about pay ranges, salary grades, job leveling structures, and how positions are mapped to specific compensation levels within an organization.
              equity:
                description: Inquiries regarding stock options, RSUs, vesting schedules, dilution, and equity grant practices for employee ownership programs.
              bonuses:
                description: Topics covering performance-based cash incentives, sign-on bonuses, commission structures, and annual or quarterly bonus calculations.
              comp-reviews:
                description: Questions about annual compensation review cycles, merit increase processes, promotion-based raises, and timing of salary adjustments.
              pay-equity:
                description: Concerns about internal pay fairness, gender and racial wage gap analysis, compensation parity audits, and ensuring equitable pay across similar roles.
          performance:
            description: Performance reviews, calibration, PIPs, promotions.
            children:
              reviews:
                description: The cyclical process of evaluating employee performance through structured assessments, feedback collection, documentation, and formal review meetings.
              calibration:
                description: The normalization process where managers align performance ratings across teams to ensure consistency, fairness, and reduce bias before finalizing reviews.
              improvement-plans:
                description: Formal documented processes for addressing sustained underperformance, including Performance Improvement Plans (PIPs), timelines, milestones, and potential outcomes.
              promotions:
                description: Advancement decisions based on performance, including criteria evaluation, level changes, compensation adjustments, and career progression pathways.
              goal-setting:
                description: Establishing performance expectations through OKRs, SMART goals, KPIs, and ongoing objective-setting frameworks that drive review criteria.
          employee-relations:
            description: Employee disputes, grievances, investigations.
            children:
              grievance-filing:
                description: Processes and procedures for employees to formally submit complaints about workplace conditions, treatment, or policy violations, including intake forms, timelines, and initial review steps.
              workplace-investigations:
                description: Formal fact-finding inquiries into allegations of misconduct, harassment, discrimination, or policy breaches, including evidence gathering, witness interviews, and documentation standards.
              conflict-mediation:
                description: Facilitated negotiation and resolution sessions between disputing parties to reach mutually acceptable agreements without formal disciplinary action.
              disciplinary-proceedings:
                description: Structured processes for addressing verified misconduct or performance issues, including verbal warnings, written reprimands, performance improvement plans, and termination procedures.
          learning-and-dev:
            description: Training programs, certifications, career development.
            children:
              training-programs:
                description: Workshops, courses, and seminars available for employee enrollment, including scheduling, delivery methods, and curriculum details.
              certification-support:
                description: Company-sponsored credentials, exam funding, renewal tracking, and professional license maintenance programs.
              career-pathing:
                description: Succession planning, role progression frameworks, promotion requirements, and long-term career trajectory mapping.
              skill-assessment:
                description: Competency evaluations, skills gap analysis, 360 feedback, and diagnostic tools to identify development needs.
              learning-platforms:
                description: LMS access, e-learning portals, content libraries, and digital tools for self-directed training and progress tracking.
          culture:
            description: Culture-building, engagement surveys, DEI, internal events.

            children:
              dei:
                description: Programs and initiatives promoting diversity, equity, and inclusion in the workplace, including bias training, resource groups, and equitable policies.
              engagement:
                description: Measuring and improving employee morale through surveys, feedback loops, pulse checks, and action planning based on results.
              events:
                description: Planning and executing internal gatherings like team-building activities, holiday parties, celebrations, and social events to foster community.
              values:
                description: Defining, communicating, and reinforcing company core values, mission, vision, and expected behavioral norms across the organization.
              recognition:
                description: Systems and programs for acknowledging employee contributions, including awards, peer-to-peer recognition, and appreciation initiatives.
      # ---------- operations ----------
      operations:
        description: >
          Business operations: project management, vendor management,
          procurement, facilities, internal processes.
        children:
          project-management:
            description: Planning, scheduling, sprint coordination, roadmaps, status updates.
            children:
              scope-planning:
                description: Defining project boundaries, requirements, deliverables, and work breakdown structures during initial phases.
              timeline-management:
                description: Creating and maintaining schedules, mapping dependencies, setting milestones, and managing deadlines.
              sprint-coordination:
                description: Planning and executing agile iterations including backlog grooming, standups, reviews, and retrospectives.
              roadmap-planning:
                description: Developing strategic long-term visions, release plans, and milestone alignment across multiple projects or teams.
              status-reporting:
                description: Generating progress updates, performance dashboards, and communications for project stakeholders and leadership.
              risk-management:
                description: Identifying, assessing, prioritizing, and mitigating potential threats and issues that could impact project success.
          program-management:
            description: Cross-team programs, dependencies, milestones, governance.
            children:
              program-roadmap:
                description: Establishes the multi-phase timeline, major milestones, and sequencing of projects within a program to align with strategic business objectives and resource capacity.
              stakeholder-alignment:
                description: Manages communication cadence, expectation setting, and collaborative decision-making across executive sponsors, functional leaders, and delivery teams to maintain program support and resolve conflicts.
              dependency-orchestration:
                description: Maps, monitors, and mitigates inter-project dependencies, technical interfaces, and delivery handoffs to prevent delays and ensure cohesive integration across the program portfolio.
              governance-framework:
                description: Defines program-level decision rights, steering committee structures, stage-gate approvals, compliance checkpoints, and escalation protocols for transparent oversight and risk management.
              benefits-realization:
                description: Quantifies expected business value, tracks leading indicators and lagging outcomes, and ensures program deliverables achieve targeted ROI and strategic impact through continuous measurement.
          vendor-management:
            description: Vendor selection, contracts, performance reviews.
            children:
              vendor-selection:
                description: Processes for identifying, evaluating, and choosing potential suppliers or service providers based on requirements, capabilities, and strategic fit.
              contract-management:
                description: Creating, negotiating, executing, and administering legally binding agreements with vendors, including terms, conditions, and compliance monitoring.
              performance-monitoring:
                description: Ongoing assessment and measurement of vendor deliverables, service levels, KPIs, and quality against contractual obligations and business needs.
              vendor-risk-management:
                description: Identifying, assessing, and mitigating potential risks associated with vendor relationships, including financial instability, compliance violations, and supply chain disruptions.
              vendor-relationship-management:
                description: Building and maintaining collaborative, long-term partnerships with vendors through communication, governance, issue resolution, and strategic alignment.
          procurement:
            description: Sourcing, RFPs, supplier evaluation, purchase orders.
            children:
              rfp-process:
                description: Managing the complete lifecycle of requests for proposals, quotes, and information including creation, distribution, vendor Q&A, evaluation criteria, scoring, and award recommendations.
              supplier-evaluation:
                description: Conducting due diligence on supplier capabilities, financial stability, quality certifications, risk exposure, and performance history to inform sourcing decisions.
              purchase-orders:
                description: Processing requisitions, generating purchase orders, managing approval hierarchies, tracking order status, and confirming goods receipt against POs.
              sourcing-strategy:
                description: Analyzing spend data, developing category strategies, identifying sourcing levers, and planning supplier consolidation or diversification initiatives.
              contract-management:
                description: Negotiating pricing and commercial terms, drafting legal agreements, maintaining contract repositories, monitoring compliance, and managing renewals or amendments.
          facilities:
            description: Office space, real estate, workplace services.
            children:
              space-management:
                description: Managing office layout, desk assignments, meeting room bookings, and overall workspace utilization to optimize employee productivity and space efficiency.
              maintenance-operations:
                description: Coordinating preventive and reactive maintenance for building systems, equipment, and infrastructure to ensure safe and functional work environments.
              workplace-services:
                description: Delivering employee-facing services such as reception, mail distribution, food and beverage programs, and other workplace amenities.
              health-safety-compliance:
                description: Ensuring workplace safety, regulatory compliance, emergency preparedness, and adherence to health standards and building codes.
          business-continuity:
            description: BCP, DR, risk management, incident response.

            children:
              disaster-recovery:
                description: Technical strategies and procedures for restoring IT infrastructure, systems, data, and applications after a disruptive event to maintain technology operations.
              incident-response:
                description: Immediate tactical actions, escalation protocols, and coordination steps taken to detect, contain, and resolve disruptions during the initial crisis phase.
              risk-assessment:
                description: Systematic identification and analysis of potential threats, vulnerabilities, and business impacts to prioritize continuity requirements and mitigation strategies.
              crisis-communication:
                description: Internal and external messaging frameworks, stakeholder notification protocols, and public relations strategies used during business disruptions to maintain trust and coordination.
      # ---------- product ----------
      product:
        description: >
          Product management: strategy, specifications, roadmaps,
          customer feedback, prioritization.
        children:
          roadmap:
            description: Product roadmap, prioritization, OKR planning.
            children:
              roadmap-creation:
                description: Questions about building, structuring, and formatting a product roadmap from initial planning through defining timelines, themes, and initiative organization.
              prioritization-frameworks:
                description: Queries on specific scoring models and decision-making systems like RICE, MoSCoW, or Kano for ranking roadmap features and projects.
              okr-alignment:
                description: How to link product roadmap initiatives with company Objectives and Key Results, ensuring strategic goal alignment and measurable outcomes.
              roadmap-communication:
                description: Sharing roadmaps with stakeholders, creating presentations for leadership, and managing cross-team visibility and expectations.
              roadmap-maintenance:
                description: Regularly updating roadmaps based on new data, reprioritizing items, and managing version control as circumstances evolve.
          prd:
            description: Product requirements, feature specifications, user stories, acceptance criteria.
            children:
              user-stories:
                description: Creating concise, user-centric narratives that capture who wants what and why, following formats like "As a [user], I want [goal] so that [benefit]" and INVEST principles.
              acceptance-criteria:
                description: Defining specific, measurable, and testable conditions that must be met for a feature or user story to be considered complete and acceptable to stakeholders.
              feature-specs:
                description: Documenting detailed functional and non-functional requirements, technical constraints, and behavioral specifications for product capabilities.
              prioritization:
                description: Ranking requirements using frameworks like MoSCoW, RICE scoring, or Kano model to align development effort with business value and strategic goals.
              success-metrics:
                description: Establishing measurable KPIs and success indicators to evaluate whether a feature delivers intended outcomes and business impact.
          user-research-pm:
            description: User interviews, surveys, persona work for product decisions.
            children:
              user-interviews:
                description: Planning, conducting, and synthesizing one-on-one qualitative conversations with users to uncover deep insights about needs, pain points, and behaviors for product direction.
              surveys:
                description: Designing, distributing, and analyzing structured questionnaires to collect quantitative data from large user populations for statistical validation of product hypotheses.
              persona-development:
                description: Creating, validating, and maintaining detailed fictional representations of key user segments based on research data to guide product decisions and team alignment.
              usability-testing:
                description: Observing real users interacting with prototypes or live products to identify friction points, navigation issues, and opportunities to improve user experience.
              user-feedback-analysis:
                description: Systematically collecting, categorizing, and extracting actionable insights from support tickets, app reviews, and other unsolicited user comments for product improvements.
          analytics:
            description: Product analytics, funnels, retention, A/B testing.
            children:
              funnel-analysis:
                description: Analyzing multi-step conversion flows to identify drop-off points and optimize user progression through signup, onboarding, purchase, or other critical paths.
              retention-cohorts:
                description: Measuring how different user cohorts return over time, analyzing churn patterns, and identifying factors that drive long-term engagement and product stickiness.
              experimentation-ab-testing:
                description: Designing and analyzing controlled experiments to measure the impact of product changes, including statistical significance, sample sizes, and feature rollout decisions.
              event-instrumentation:
                description: Implementing tracking code and defining event schemas to capture user interactions, ensuring data quality, and maintaining analytics tool configurations.
              metrics-definition:
                description: Establishing key performance indicators, north star metrics, and measurement frameworks that align product teams around quantifiable success criteria.
          growth:
            description: Growth experiments, activation, retention, viral loops.
            children:
              acquisition:
                description: Strategies and tactics for acquiring new users through paid and organic channels including advertising, SEO, content marketing, partnerships, and app store optimization.
              activation:
                description: Onboarding flows and product experiences designed to deliver initial value and guide users to their first "aha moment" with the core functionality.
              retention:
                description: Engagement strategies and product features that keep users returning over time, including notification systems, habit loops, re-engagement campaigns, and churn reduction.
              referral:
                description: Viral loop mechanics and referral program design that incentivize existing users to invite new users and create network effects.
              experimentation:
                description: Frameworks for planning, running, and analyzing A/B tests and growth experiments to validate hypotheses and optimize user conversion throughout the funnel.
          pricing:
            description: Pricing strategy, packaging, monetization experiments.

            children:
              pricing-models:
                description: Exploring different pricing structures such as subscription, usage-based, tiered, freemium, or one-time purchase models to determine the best fit for product-market fit and revenue goals.
              price-optimization:
                description: Conducting research, surveys, and A/B experiments to identify optimal price points, price elasticity, and willingness-to-pay that maximizes revenue and adoption.
              packaging-strategy:
                description: Designing feature bundles, tier definitions, and plan structures that segment customers effectively and drive upsell from free to paid and between premium tiers.
              discounting-strategy:
                description: Developing promotional pricing, volume discounts, seasonal offers, and coupon strategies to accelerate acquisition without eroding long-term perceived value.
              competitive-pricing:
                description: Analyzing competitor price points, packaging, and positioning to inform differentiation strategies and market placement relative to alternatives.
      # ---------- design ----------
      design:
        description: >
          UI/UX design, visual design, design systems, prototyping,
          brand expression in product.
        children:
          ui:
            description: Visual interface design, components, layout, color systems.
            children:
              ui-components:
                description: Design and implementation of reusable interface elements including buttons, form inputs, cards, modals, and navigation components with their interactive states.
              layout-systems:
                description: Grid frameworks, spacing scales, compositional structures, and responsive breakpoints that organize content and interface elements across different screen sizes.
              color-palettes:
                description: Interface-specific color schemes, semantic color tokens, accessibility contrast ratios, and theming systems for digital products.
              typography:
                description: Font selection, text hierarchy, sizing scales, line heights, and readability optimization specifically for screen-based interfaces.
              icon-systems:
                description: Icon libraries, custom iconography, sizing standards, and usage guidelines for creating consistent visual symbols in user interfaces.
          ux:
            description: User experience, flows, information architecture, interaction design.
            children:
              user-research:
                description: Planning and conducting qualitative and quantitative studies like interviews, surveys, ethnographic observation, and analytics reviews to understand user behaviors, needs, pain points, and mental models before and during design.
              information-architecture:
                description: Structuring and organizing digital content into logical sitemaps, navigation systems, taxonomies, and labeling schemes that help users find information and understand where they are within a product.
              interaction-design:
                description: Defining how users engage with interface elements through wireframes, state changes, micro-interactions, gesture patterns, and feedback loops to create intuitive and responsive digital behaviors.
              usability-testing:
                description: Observing representative users complete specific tasks in moderated or unmoderated sessions, analyzing success rates, friction points, and qualitative feedback to validate or improve design decisions.
              accessibility:
                description: Ensuring digital experiences conform to WCAG standards and inclusive design principles, supporting assistive technologies like screen readers, keyboard navigation, and accommodating diverse cognitive and physical abilities.
              ux-writing:
                description: Crafting clear, concise, and contextual interface copy including button labels, error messages, onboarding text, and navigational hints that guide users and reinforce brand voice without visual design elements.
          visual:
            description: Visual identity, typography, illustration, motion.
            children:
              typography:
                description: Font selection, typeface pairing, hierarchy establishment, and readability optimization for visual communication.
              illustration:
                description: Custom artwork creation, digital drawing techniques, and visual storytelling through original imagery.
              color-theory:
                description: Palette development, color harmony, contrast ratios, and accessibility compliance in visual design.
              iconography:
                description: Symbol design, pictogram systems, and icon library creation for interface and brand communication.
              motion-graphics:
                description: Animation principles, video graphics, and dynamic visual effects for digital and broadcast media.
          design-systems:
            description: Design systems, component libraries, design tokens, governance.
            children:
              component-libraries:
                description: Building, organizing, and maintaining reusable UI components within a design system, including patterns, variants, and API design.
              design-tokens:
                description: Defining, naming, and managing platform-agnostic design primitives like colors, typography, spacing, and shadows that propagate across products.
              governance:
                description: Establishing decision-making processes, contribution models, review workflows, and ownership structures for maintaining and evolving a design system.
              documentation:
                description: Creating comprehensive guides, usage examples, code snippets, and interactive demos that help designers and developers understand and apply system components.
              adoption:
                description: Strategies for onboarding teams, measuring usage, driving engagement, and fostering a culture that embraces the design system across an organization.
          prototyping:
            description: Wireframes, hi-fi prototypes, Figma, interactive specs.
            children:
              wireframing:
                description: Low-fidelity structural layouts and basic page schematics without detailed visual design, focusing on information architecture and content hierarchy.
              interactive-prototypes:
                description: Clickable high-fidelity prototypes with functional user flows, transitions, and simulated interactions for usability testing and stakeholder demonstration.
              animation-micro-interactions:
                description: Motion design specifications for transitions, animations, and micro-interactions that communicate behavior and enhance user experience within prototypes.
              prototype-handoff:
                description: Developer handoff processes including generating specifications, assets, measurements, and documentation directly from design prototypes for implementation.
              rapid-prototyping:
                description: Fast iteration techniques using paper, digital tools, or code to quickly validate concepts and gather feedback before investing in high-fidelity work.
          brand-design:
            description: Brand identity, logos, brand guidelines, brand storytelling.

            children:
              logo-design:
                description: Creating and refining logo marks, wordmarks, and symbolic elements that serve as the primary visual identifier and cornerstone of a brand's identity system.
              brand-guidelines:
                description: Developing comprehensive documentation that specifies exact usage rules for logos, colors, typography, imagery, voice, and other brand elements to ensure consistency across all touchpoints.
              brand-strategy:
                description: Conducting market research, competitive analysis, and defining brand positioning, architecture, target audiences, and core value propositions to establish strategic foundations.
              visual-identity:
                description: Designing the complete visual language system including color palettes, typography standards, photography style, illustration guidelines, and supporting graphics that extend beyond the logo.
              brand-messaging:
                description: Crafting the verbal identity framework including brand voice, tone, key messages, taglines, naming conventions, and copywriting principles that communicate brand personality and values.
      # ---------- marketing ----------
      marketing:
        description: >
          Marketing: brand, content, advertising, growth, social media,
          campaigns, SEO, copywriting.
        children:
          content:
            description: Blog posts, articles, white papers, video scripts, long-form content.
            children:
              blog-articles:
                description: Creating and managing editorial articles for company blogs, including topic research, drafting, editing, and publishing schedules for regular content marketing.
              white-papers:
                description: Producing authoritative, in-depth reports that address industry problems and present solutions, typically used for B2B lead generation and thought leadership.
              case-studies:
                description: Developing customer success stories that showcase specific use cases, results, and testimonials to demonstrate product value and build trust with prospects.
              video-scripts:
                description: Writing scripts for marketing videos including explainer videos, product demos, testimonials, and brand stories for platforms like YouTube or website embedding.
              ebooks:
                description: Creating comprehensive, downloadable guides or reports that provide deep value on specific topics, often gated behind lead capture forms for demand generation.
              infographics:
                description: Designing visually compelling graphics that present data, statistics, or complex information in an easily digestible format for sharing and engagement.
          campaigns:
            description: Campaign planning, advertising, paid acquisition, email sequences.
            children:
              campaign-strategy:
                description: Planning campaign objectives, audience segmentation, messaging frameworks, channel selection, and strategic roadmaps to align marketing initiatives with business goals.
              paid-media-buying:
                description: Managing advertising spend across platforms, executing bid strategies, negotiating media placements, and optimizing budget allocation for paid campaign distribution.
              campaign-analytics:
                description: Tracking campaign performance metrics, building attribution models, analyzing ROI, and generating insights to measure effectiveness and inform future decisions.
              creative-development:
                description: Producing campaign assets including ad copy, visual designs, video content, landing pages, and creative briefs that align with campaign strategy and brand guidelines.
              campaign-operations:
                description: Coordinating campaign execution workflows, managing approval processes, scheduling launches, configuring marketing automation, and ensuring cross-functional team alignment.
              campaign-optimization:
                description: Conducting A/B tests, refining audience targeting, improving conversion rates, adjusting bidding strategies, and iteratively enhancing campaign performance based on data.
          brand-marketing:
            description: Brand strategy, positioning, messaging, storytelling.
            children:
              brand-identity:
                description: Visual brand elements including logo design, color palettes, typography, and brand systems that create recognizable brand aesthetics.
              brand-positioning:
                description: Strategic market positioning, competitive differentiation, target audience definition, and unique value proposition development.
              brand-messaging:
                description: Brand voice, tone, key messages, taglines, and copywriting frameworks that define how the brand communicates verbally.
              brand-storytelling:
                description: Narrative development, brand story creation, origin stories, and emotional brand narratives that connect with audiences.
              brand-guidelines:
                description: Brand standards, usage rules, style guides, and governance documentation ensuring consistent brand application across touchpoints.
          seo:
            description: Search engine optimization, keywords, link-building, technical SEO.
            children:
              technical-seo:
                description: Optimizing website infrastructure for search engine crawling and indexing, including site speed, mobile-friendliness, structured data, XML sitemaps, and resolving crawl errors.
              keyword-research:
                description: Identifying and analyzing search terms and queries that users enter into search engines to target in SEO strategies, including search volume, competition, and intent analysis.
              link-building:
                description: Acquiring hyperlinks from other websites to improve search engine rankings, including outreach strategies, guest posting, backlink analysis, and disavowing toxic links.
              on-page-seo:
                description: Optimizing individual web pages to rank higher in search results, including title tags, meta descriptions, header tags, content quality, internal linking, and image optimization.
              local-seo:
                description: Optimizing a business's online presence to attract more customers from relevant local searches, including Google Business Profile management, local citations, review generation, and location-based keyword targeting.
          social-media:
            description: Social media strategy, posts, community management.
            children:
              platform-strategy:
                description: Developing tailored strategies for individual social media platforms including audience analysis, feature utilization, and platform-specific content approaches.
              content-creation:
                description: Producing social-native content formats such as short-form videos, stories, carousels, and platform-optimized copywriting.
              community-engagement:
                description: Managing direct interactions with followers, responding to comments and messages, and fostering brand community growth.
              influencer-collaboration:
                description: Identifying, negotiating with, and managing partnerships with social media influencers and content creators.
              analytics-reporting:
                description: Measuring social media performance through engagement rates, reach, conversions, and creating performance dashboards.
          email-marketing:
            description: Newsletter, drip campaigns, lifecycle emails, list management.
            children:
              list-building:
                description: Strategies for growing email subscriber bases through opt-in forms, lead magnets, and consent management while maintaining data quality.
              automation-workflows:
                description: Setting up triggered email sequences, drip campaigns, and behavioral-based messaging that deploy automatically based on user actions.
              template-design:
                description: Creating responsive email layouts, visual templates, and branded designs that render consistently across devices and email clients.
              segmentation-strategy:
                description: Dividing subscriber lists into targeted cohorts based on demographics, purchase history, engagement levels, or behavioral data for personalized messaging.
              deliverability-compliance:
                description: Maximizing inbox placement rates, avoiding spam filters, authenticating sender domains, and adhering to email regulations like GDPR and CAN-SPAM.
          partnerships:
            description: Co-marketing, integration partnerships, channel partners.
            children:
              co-marketing:
                description: Joint marketing campaigns and activities with partners to leverage shared audiences and resources.
              channel-partners:
                description: Third-party resellers, distributors, and referral partners who sell or promote products through their own sales channels.
              integration-partners:
                description: Technical collaborations connecting products via APIs or native integrations to create seamless user experiences.
              affiliate-partners:
                description: Performance-based partnerships where external publishers earn commissions for driving traffic, leads, or sales through tracked links.
              strategic-alliances:
                description: Long-term, high-level partnerships focused on broad business objectives, market expansion, and deep organizational alignment.
          events:
            description: Conferences, trade shows, webinars, field marketing.
          growth-marketing:
            description: Growth experiments, viral loops, referral programs.

            children:
              experimentation:
                description: Designing and running A/B tests, multivariate experiments, and growth hacking experiments to identify scalable acquisition and retention strategies.
              viral-loops:
                description: Creating and optimizing self-perpetuating user acquisition mechanisms where existing users naturally invite new users through product features or incentives.
              referral-programs:
                description: Building structured incentive systems that reward existing customers for successfully bringing new users or customers to the product or service.
              conversion-optimization:
                description: Improving landing pages, signup flows, and user funnels to increase the percentage of visitors who complete desired actions and become active users.
              user-onboarding:
                description: Designing first-time user experiences, product tours, and activation sequences that convert new signups into engaged, retained customers.
      # ---------- sales ----------
      sales:
        description: >
          Sales: pipeline management, prospecting, demos, negotiation,
          account management, customer success.
        children:
          pipeline:
            description: Sales pipeline, forecasting, deal stages, CRM hygiene.
            children:
              deal-stages:
                description: Defining and managing the sequential phases opportunities progress through from lead to close, including stage criteria, exit conditions, and progression rules.
              forecasting:
                description: Predicting future revenue by analyzing pipeline value, stage probabilities, sales cycle length, and historical win rates to support quota and budget planning.
              crm-hygiene:
                description: Maintaining data accuracy and completeness through duplicate management, field validation, activity logging, and regular audits to ensure reliable pipeline reporting.
              pipeline-metrics:
                description: Tracking KPIs such as pipeline velocity, stage-to-stage conversion rates, average deal size, and coverage ratio to assess sales process health and identify bottlenecks.
              pipeline-review:
                description: Conducting regular manager-rep pipeline inspections to validate deal status, identify at-risk opportunities, remove stale entries, and strategize next steps.
          prospecting:
            description: Outbound prospecting, sequences, cold outreach.
            children:
              lead-research:
                description: Identifying and qualifying potential customers who match your ideal customer profile through market research and data analysis.
              contact-enrichment:
                description: Finding, verifying, and appending accurate contact details like email addresses, phone numbers, and social media profiles to prospect records.
              outreach-channels:
                description: Selecting and executing the optimal communication methods for initial contact including email, phone, social media, and direct mail.
              sequence-cadence:
                description: Designing multi-touch outreach schedules that define the timing, frequency, and number of follow-up attempts across different channels.
              message-crafting:
                description: Creating personalized cold outreach content including subject lines, opening hooks, value propositions, and call-to-action statements.
          demos:
            description: Product demos, technical evaluations, POCs.
            children:
              demo-preparation:
                description: Planning and configuring demo environments, scripting presentations, and preparing materials before delivering a product demonstration.
              demo-delivery:
                description: Executing live or recorded product demonstrations, managing presentation flow, and handling real-time questions from prospects.
              technical-poc:
                description: Engineering-led proof-of-concept implementations and technical evaluations to validate product capabilities against specific requirements.
              demo-customization:
                description: Tailoring demonstration content, data, and scenarios to specific prospect industries, use cases, or technical environments.
              demo-follow-up:
                description: Distributing demo recordings, tracking prospect engagement, addressing outstanding questions, and coordinating next steps after demonstrations.
          negotiation:
            description: Pricing, contract negotiation, deal closing.
            children:
              pricing-tactics:
                description: Focuses specifically on discounting strategies, price anchoring, and monetary concessions during sales negotiations.
              contract-terms:
                description: Covers non-price elements like payment terms, SLAs, liability clauses, and legal conditions in agreements.
              closing-techniques:
                description: Addresses final-stage methods for securing commitment, handling last-minute objections, and creating urgency to sign.
              stakeholder-alignment:
                description: Managing multiple decision-makers, identifying champions, and navigating organizational buying committees during negotiations.
              competitive-negotiation:
                description: Strategies for negotiating when facing direct competition, including differentiation and value justification under competitive pressure.
          account-management:
            description: Account expansion, renewals, QBRs, executive sponsors.
            children:
              account-expansion:
                description: Strategies for growing existing customer accounts through upselling, cross-selling, and identifying new business opportunities within current relationships.
              renewal-management:
                description: Processes and tactics for managing contract renewals, including forecasting, risk assessment, negotiation, and ensuring customer retention.
              quarterly-business-reviews:
                description: Planning, conducting, and following up on QBRs to align strategic goals, demonstrate value, and strengthen executive relationships.
              executive-sponsor-development:
                description: Building and nurturing C-level advocacy programs, mapping executive stakeholders, and leveraging sponsor relationships for account growth.
              account-health-monitoring:
                description: Tracking customer satisfaction, engagement metrics, risk signals, and health scores to proactively identify at-risk accounts and opportunities.
          customer-success:
            description: Onboarding, adoption, health scores, upsell.
            children:
              onboarding:
                description: Guiding new customers through initial setup, training, and configuration to ensure a smooth start and quick time-to-value.
              adoption:
                description: Driving ongoing product usage, feature engagement, and workflow integration to maximize customer value and stickiness.
              health-scoring:
                description: Building and monitoring quantitative customer health metrics, risk indicators, and success scores to proactively identify at-risk accounts.
              expansion:
                description: Identifying and executing upsell and cross-sell opportunities within existing accounts to increase revenue and deepen relationships.
              renewals:
                description: Managing the end-to-end contract renewal process, including negotiations, pricing discussions, and securing long-term commitments.
              churn-prevention:
                description: Implementing targeted interventions, success plans, and recovery strategies for customers showing signs of potential cancellation.
          sales-enablement:
            description: Sales playbooks, battlecards, training, collateral.

            children:
              playbook-design:
                description: Creating structured sales playbooks that outline step-by-step processes, messaging frameworks, and winning strategies for specific selling scenarios, buyer personas, or product lines.
              competitive-battlecards:
                description: Developing concise competitive intelligence cards that equip sales reps with key differentiators, objection handlers, and positioning guidance against specific competitors.
              sales-training-programs:
                description: Designing and delivering comprehensive training curricula covering product knowledge, sales methodologies, soft skills, and certification paths for sales team development.
              collateral-management:
                description: Organizing, storing, and distributing sales-enablement content such as presentations, case studies, one-pagers, and videos through centralized repositories and content management systems.
              onboarding-acceleration:
                description: Building structured ramp-up programs and resources that reduce time-to-productivity for new sales hires through guided learning paths and milestone-based training.
      # ---------- support ----------
      support:
        description: >
          Customer support, technical support, documentation,
          training, knowledge bases.
        children:
          customer-support:
            description: Tier 1/2 customer support, ticket triage, SLAs.
            children:
              ticket-triage:
                description: Initial assessment, categorization, and prioritization of incoming support tickets to determine urgency, required expertise, and appropriate routing for resolution.
              sla-management:
                description: Monitoring service level agreement compliance, tracking response and resolution metrics, and managing escalation procedures when thresholds are at risk of breach.
              customer-communication:
                description: Direct interaction with customers through email, chat, and phone channels to provide real-time assistance, status updates, and resolution confirmation.
              escalation-handling:
                description: Managing the handoff process for complex issues from Tier 1 to Tier 2 support, including documentation requirements, stakeholder notification, and timeline tracking.
              account-billing:
                description: Resolving customer inquiries related to invoices, payment processing, subscription changes, refunds, and account access issues.
          technical-support:
            description: Technical troubleshooting, escalations, root-cause analysis.
            children:
              incident-response:
                description: Reactive troubleshooting of production outages, service disruptions, and critical system failures requiring immediate resolution.
              escalation-management:
                description: Coordinating handoffs to specialized teams, managing ticket queues, and tracking complex issues that exceed frontline capabilities.
              root-cause-analysis:
                description: Conducting post-incident investigations to identify underlying system flaws and implementing preventive measures to avoid recurrence.
              system-maintenance:
                description: Performing scheduled updates, patches, backups, and proactive infrastructure health checks to prevent future technical issues.
              access-permissions:
                description: Resolving authentication failures, authorization errors, role-based access control issues, and credential management problems.
          documentation:
            description: User-facing documentation, help center, API docs.
            children:
              api-documentation:
                description: Technical reference for REST or GraphQL endpoints, authentication methods, request/response schemas, and code samples for integrating with our platform's APIs.
              knowledge-base:
                description: Searchable collection of help articles, frequently asked questions, and troubleshooting steps designed for self-service customer support.
              user-guides:
                description: Step-by-step instructional manuals and tutorials that walk end-users through common tasks, features, and workflows in our applications.
              developer-docs:
                description: Integration guides, SDK documentation, and implementation examples for developers building applications on our platform.
              release-notes:
                description: Chronological summaries of new features, bug fixes, breaking changes, and deprecation notices for each software version.
          training:
            description: Customer training, certifications, webinars.

            children:
              onboarding-training:
                description: Foundational training for new customers covering initial product setup, basic features, and essential workflows to get started quickly.
              certification-programs:
                description: Official credentialing paths including exams, study materials, and proctored assessments that validate expertise and product mastery.
              live-sessions:
                description: Scheduled instructor-led webinars, workshops, and virtual classrooms offering real-time interaction, Q&A, and hands-on demonstrations.
              self-paced-courses:
                description: On-demand video tutorials, interactive modules, and downloadable resources that customers can access anytime to learn at their own speed.
  # =====================================================================
  # PERSONAL
  # =====================================================================
  personal:
    description: >
      Personal life, hobbies, health, family, individual learning,
      recreation. Not paid work or career-task activities.
    children:

      # ---------- physical health ----------
      health:
        description: >
          Physical wellbeing, fitness, nutrition, sleep, medical care,
          chronic conditions. (Mental health is its own root.)
        children:
          fitness:
            description: Exercise, workouts, strength training, cardio, athletic conditioning.
            children:
              strength-training:
                description: Lifting, powerlifting, bodyweight strength, hypertrophy.
                children:
                  powerlifting:
                    description: Competitive maximal strength training focused on the squat, bench press, and deadlift with specific rules and techniques.
                  bodybuilding:
                    description: Resistance training focused on muscle hypertrophy, aesthetics, and physique development through targeted exercises and nutrition.
                  bodyweight-training:
                    description: Strength development using only body weight as resistance through calisthenics, gymnastics, and progressive exercise variations.
                  weightlifting:
                    description: Olympic sport training for the snatch and clean-and-jerk lifts emphasizing explosive power, mobility, and technical precision.
                  functional-strength:
                    description: Training that improves strength for real-world activities and sports performance through multi-joint movement patterns.
              cardio:
                description: Running, cycling, swimming, rowing, conditioning.
                children:
                  running:
                    description: Questions about running technique, treadmill workouts, outdoor jogging, sprint training, and foot-based cardiovascular exercise programs.
                  cycling:
                    description: Questions about indoor spinning classes, road biking, stationary bike workouts, and pedal-powered cardio training methods.
                  swimming:
                    description: Questions about pool lap swimming, open water strokes, water aerobics, and aquatic-based heart rate training.
                  rowing:
                    description: Questions about indoor ergometer technique, rowing machine workouts, crew rowing, and full-body seated cardio conditioning.
                  walking:
                    description: Questions about brisk walking programs, hiking for fitness, treadmill incline walking, and low-impact pedestrian cardiovascular activity.
                  elliptical-training:
                    description: Questions about cross-trainer machines, elliptical stride mechanics, low-impact gliding workouts, and standing cardio equipment usage.
              yoga:
                description: Hatha, vinyasa, yin, restorative, hot yoga.
                children:
                  yoga-styles:
                    description: Questions about specific yoga traditions and methodologies including vinyasa flow, hatha alignment, yin passive holds, restorative relaxation, hot yoga, ashtanga, kundalini, and iyengar, focusing on the characteristics, differences, and appropriate selection of each style.
                  yoga-poses:
                    description: Inquiries about individual asanas and physical postures including alignment techniques, modifications for injuries or limited mobility, pose variations, sequencing principles, contraindications, and the anatomical benefits of specific positions.
                  yoga-philosophy:
                    description: Questions exploring the spiritual, historical, and philosophical underpinnings of yoga such as the eight limbs, yoga sutras, meditation practices, mindfulness principles, ethical guidelines, and the integration of ancient yogic wisdom into modern life.
                  yoga-breathing:
                    description: Queries about pranayama breathwork techniques including ujjayi ocean breath, alternate nostril breathing, kapalabhati skull shining breath, breath retention practices, and methods for coordinating breath with movement during asana practice.
                  yoga-equipment:
                    description: Questions regarding yoga props and gear such as mat selection and care, block and strap usage, bolster and blanket support, wheel integration, appropriate clothing, and how to effectively utilize equipment for safety, alignment, and enhanced practice.
              pilates:
                description: Pilates mat work, reformer, core conditioning.
              hiit:
                description: HIIT, circuit training, metcon.
              flexibility:
                description: Stretching, mobility work, foam rolling.
          nutrition:
            description: Diet, meal planning, macros, dietary restrictions, supplements.
            children:
              meal-planning:
                description: Weekly meal planning, prep schedules, batch cooking.
                children:
                  meal-prep-techniques:
                    description: Specific cooking and preparation methods for batch cooking, make-ahead components, freezer-friendly meals, and assembly-line strategies to streamline weekly food preparation.
                  grocery-shopping-lists:
                    description: Creating organized shopping lists, coordinating purchases with meal plans, managing pantry inventory, and optimizing grocery store trips to reduce waste and save time.
                  recipe-planning:
                    description: Selecting balanced recipes, building weekly menus, rotating favorite dishes, incorporating seasonal ingredients, and organizing recipes into cohesive meal plans.
                  prep-scheduling:
                    description: Scheduling dedicated prep sessions, blocking time for cooking, coordinating meal preparation with weekly calendars, and planning optimal cooking sequences.
                  storage-solutions:
                    description: Choosing appropriate food storage containers, labeling prepped meals, organizing refrigerator and freezer space, and maintaining food safety for stored meals.
              dietary-restrictions:
                description: Vegetarian, vegan, gluten-free, keto, paleo, allergies.
                children:
                  allergen-avoidance:
                    description: Covers dietary needs involving the complete elimination of specific foods that trigger immune-mediated allergic reactions, such as peanuts, tree nuts, shellfish, eggs, dairy, or wheat, requiring careful label reading and cross-contamination prevention.
                  ethical-religious:
                    description: Encompasses dietary patterns guided by moral, philosophical, or spiritual beliefs including vegetarianism, veganism, kosher, halal, Buddhist, and Hindu dietary laws, focusing on principles of animal welfare, environmental stewardship, or religious doctrine.
                  medical-therapeutic:
                    description: Addresses clinically-prescribed or recommended eating patterns for managing diagnosed health conditions such as celiac disease, diabetes, hypertension, chronic kidney disease, or metabolic disorders, often requiring professional medical supervision.
                  macronutrient-protocols:
                    description: Focuses on diets structured around specific ratios of carbohydrates, fats, and proteins like ketogenic, low-carb high-fat, high-protein, or low-fat approaches, typically adopted for weight management, athletic performance, or metabolic health goals.
                  ingredient-exclusions:
                    description: Covers the elimination of specific ingredients or food components like gluten, dairy, soy, corn, FODMAPs, or artificial additives due to sensitivities, intolerances, or personal wellness preferences, distinct from life-threatening allergies.
              macros:
                description: Macronutrients, calorie tracking, body composition goals.
                children:
                  protein-intake:
                    description: Questions about daily protein requirements, optimal intake timing, complete vs incomplete protein sources, and protein's role in muscle synthesis and satiety.
                  carbohydrate-management:
                    description: Queries covering carb types, net versus total carbs, glycemic index, carb cycling strategies, and carbohydrate timing around workouts.
                  dietary-fats:
                    description: Discussions about healthy fat sources, essential fatty acids, omega-3 to omega-6 ratios, saturated vs unsaturated fats, and fat's hormonal impacts.
                  calorie-targets:
                    description: Determining total daily energy expenditure, setting calorie deficits for fat loss or surpluses for muscle gain, and adjusting intake based on metabolic adaptation.
                  macro-ratios:
                    description: Balancing macronutrient percentages for specific goals like ketogenic, high-protein, or zone diets, and adjusting macro splits based on body composition changes.
              supplements:
                description: Vitamins, protein, creatine, micronutrients.
                children:
                  vitamins-minerals:
                    description: Questions about specific vitamin and mineral supplements including dosage, deficiency symptoms, interactions, and recommendations for individual micronutrients like vitamin D, B12, iron, or magnesium.
                  protein-supplements:
                    description: Inquiries regarding protein powder types, flavors, digestion, timing, and selection criteria for whey, casein, soy, pea, or other protein supplement products.
                  sports-performance:
                    description: Queries about ergogenic aids and athletic enhancement supplements such as creatine, pre-workout formulas, BCAAs, beta-alanine, and their effects on exercise performance and recovery.
                  herbal-botanical:
                    description: Questions concerning plant-derived supplements including adaptogens like ashwagandha and rhodiola, herbal extracts such as ginseng and turmeric, and their traditional or modern therapeutic uses.
                  weight-management:
                    description: Inquiries about supplements for weight control including fat burners, appetite suppressants, thermogenics, metabolism boosters, and their safety and efficacy for losing or gaining weight.
              hydration:
                description: Water intake, electrolytes, hydration strategies.
          sleep:
            description: Sleep hygiene, sleep disorders, chronotypes, sleep tracking.
            children:
              sleep-hygiene:
                description: Bedtime routines, habits, and behavioral practices that promote consistent, high-quality sleep, including screen time limits, caffeine avoidance, and relaxation techniques.
              sleep-disorders:
                description: Medical conditions that disrupt normal sleep patterns, such as insomnia, sleep apnea, narcolepsy, restless leg syndrome, and their diagnosis, symptoms, and treatment options.
              chronotypes:
                description: Individual biological preferences for sleep timing and circadian rhythm patterns, including morning larks, night owls, and genetic factors that determine optimal sleep-wake schedules.
              sleep-tracking:
                description: Devices, applications, and methods for monitoring and analyzing sleep duration, quality, stages, and patterns using wearables, bedside sensors, or manual logging.
              sleep-environment:
                description: Physical bedroom conditions that affect sleep quality, including temperature, lighting, noise levels, mattress and pillow selection, and overall sleep space design.
          medical:
            description: Doctor visits, medications, conditions, diagnoses, insurance.
            children:
              chronic-conditions:
                description: Diabetes, hypertension, autoimmune, ongoing management.
                children:
                  metabolic-disorders:
                    description: Chronic conditions affecting metabolism and endocrine function such as diabetes, thyroid disorders, and metabolic syndrome requiring ongoing blood sugar or hormone level management.
                  cardiovascular-conditions:
                    description: Long-term heart and blood vessel diseases including hypertension, coronary artery disease, and heart failure that need continuous monitoring and risk reduction.
                  autoimmune-diseases:
                    description: Chronic illnesses where the immune system attacks the body's own tissues, such as lupus, rheumatoid arthritis, and multiple sclerosis, characterized by flare-ups and remissions.
                  respiratory-conditions:
                    description: Persistent lung and airway diseases like asthma, COPD, and pulmonary fibrosis that cause ongoing breathing difficulties and require inhalers or oxygen therapy.
                  pain-musculoskeletal:
                    description: Chronic pain and inflammatory conditions affecting joints, muscles, and bones including arthritis, fibromyalgia, and chronic back pain impacting daily mobility and function.
              acute-care:
                description: Injuries, infections, urgent care, ER visits.
              preventive:
                description: Annual physicals, screenings, vaccinations.
                children:
                  routine-checkups:
                    description: Covers inquiries about regular wellness visits, annual physical examinations, and periodic health assessments for ongoing preventive care.
                  cancer-screenings:
                    description: Focuses on questions regarding early detection tests for cancer, including mammograms, colonoscopies, Pap smears, PSA tests, and lung cancer screenings.
                  immunizations:
                    description: Addresses queries about vaccines and preventive shots, including childhood immunizations, adult boosters, flu vaccines, and travel-related vaccinations.
                  cardiovascular-screenings:
                    description: Encompasses questions about heart and blood vessel disease prevention through cholesterol checks, blood pressure monitoring, and cardiac risk evaluations.
                  lifestyle-counseling:
                    description: Handles inquiries about behavioral health guidance for disease prevention, including nutrition advice, exercise planning, weight management, and smoking cessation programs.
              medications:
                description: Prescription management, dosing, side effects, refills.
              dental:
                description: Dental care, cleanings, procedures, orthodontics.
                children:
                  preventive-dental:
                    description: Routine dental maintenance including professional cleanings, examinations, diagnostic x-rays, fluoride applications, and protective sealants to prevent oral disease.
                  restorative-dental:
                    description: Procedures to repair damaged or decayed teeth such as fillings, crowns, inlays, onlays, and root canal therapy to restore function and structure.
                  orthodontic-treatment:
                    description: Correction of misaligned teeth and malocclusion using traditional braces, clear aligners, retainers, and other appliances to improve bite and aesthetics.
                  oral-surgery:
                    description: Surgical interventions including tooth extractions, dental implant placement, wisdom teeth removal, and treatment of oral pathologies.
              vision:
                description: Eye exams, glasses, contacts, vision conditions.

                children:
                  eye-exams:
                    description: Routine vision screenings, comprehensive eye examinations, and diagnostic tests performed by optometrists or ophthalmologists to assess visual acuity and eye health.
                  corrective-lenses:
                    description: Prescription eyeglasses, contact lenses, and lens fittings, including selection, maintenance, and troubleshooting of vision correction devices.
                  eye-diseases:
                    description: Medical conditions and disorders affecting the eyes such as glaucoma, cataracts, macular degeneration, diabetic retinopathy, and their treatment options.
                  eye-surgery:
                    description: Surgical procedures to correct refractive errors or treat eye diseases, including LASIK, PRK, cataract surgery, and post-operative care.
      # ---------- mental health (NEW) ----------
      mental-health:
        description: >
          Mental and emotional wellbeing, therapy, anxiety, depression,
          stress management, coping strategies, mood tracking.
        children:
          therapy:
            description: Talk therapy, CBT, DBT, finding therapists, therapy notes.
            children:
              therapy-types:
                description: Exploring different therapeutic modalities beyond CBT and DBT, such as psychodynamic, humanistic, EMDR, ACT, and family systems therapy to match specific needs and preferences.
                children:
                  psychodynamic-therapy:
                    description: Explores unconscious patterns and early life experiences to understand current behaviors and relationships through techniques like free association and transference analysis.
                    children:
                      theoretical-foundations:
                        description: Addresses fundamental psychodynamic concepts including the unconscious mind, psychic determinism, developmental stages, and structural models of personality.
                      therapeutic-process:
                        description: Focuses on the therapeutic relationship dynamics, transference and countertransference analysis, resistance, and the working alliance in psychodynamic treatment.
                      technical-interventions:
                        description: Explores specific psychodynamic techniques such as free association, dream interpretation, clarification, confrontation, and interpretation of unconscious material.
                      applications-outcomes:
                        description: Covers the clinical applications for various mental health conditions, treatment duration and frequency, and research evidence on effectiveness and long-term benefits.
                  humanistic-person-centered:
                    description: Emphasizes self-actualization and personal growth with the therapist providing unconditional positive regard in a non-directive, client-led process.
                  trauma-focused-modalities:
                    description: Specializes in processing traumatic memories and reducing PTSD symptoms using methods like EMDR, trauma-focused CBT, and somatic experiencing.
                    children:
                      emdr:
                        description: Focuses on Eye Movement Desensitization and Reprocessing, an eight-phase protocol using bilateral stimulation to help the brain reprocess traumatic memories and reduce their emotional charge.
                      cognitive-processing-therapy:
                        description: Addresses PTSD through a structured 12-session cognitive-behavioral protocol that helps patients identify, challenge, and modify unhelpful trauma-related beliefs and stuck points.
                      prolonged-exposure:
                        description: Involves systematic imaginal and in vivo exposure to trauma memories and avoided situations to reduce fear, emotional numbing, and post-traumatic stress through habituation and processing.
                      child-adolescent-trauma:
                        description: Specializes in trauma treatment for children and teenagers, incorporating developmentally appropriate methods like TF-CBT with play therapy, caregiver involvement, and safety-focused interventions.
                      complex-developmental-trauma:
                        description: Targets complex PTSD and early-life developmental trauma, addressing attachment wounds, dissociation, and emotional dysregulation from chronic or repeated traumatic experiences.
                  mindfulness-acceptance-therapies:
                    description: Integrates present-moment awareness and acceptance strategies to help clients commit to value-driven actions while observing thoughts without judgment.
                    children:
                      acceptance-commitment-therapy:
                        description: Focuses on psychological flexibility through acceptance of internal experiences, commitment to values, and behavioral change strategies.
                      mindfulness-based-cognitive-therapy:
                        description: Integrates mindfulness practices with cognitive therapy techniques to prevent depression relapse by changing relationships with negative thought patterns.
                      dialectical-behavior-therapy:
                        description: Combines mindfulness and acceptance with distress tolerance, emotion regulation, and interpersonal effectiveness skills for borderline personality disorder and emotional dysregulation.
                      mindfulness-based-stress-reduction:
                        description: An eight-week group program teaching mindfulness meditation and yoga to reduce stress, pain, and illness-related suffering through present-moment awareness.
                      compassion-focused-therapy:
                        description: Uses mindfulness and acceptance to develop self-compassion and address shame and self-criticism by activating soothing emotional regulation systems.
                  family-systems-couples:
                    description: Examines relationship dynamics and communication patterns within couples and families using structural, strategic, or emotionally-focused approaches.
                  somatic-body-based:
                    description: Addresses psychological issues through physical awareness and body sensations, releasing stored trauma tension via movement and breathwork.
                  creative-arts-therapies:
                    description: Utilizes artistic expression through visual arts, music, drama, or dance to process emotions and experiences non-verbally.
                  integrative-holistic:
                    description: Combines multiple therapeutic approaches tailored to the individual while considering spiritual, cultural, and lifestyle factors for whole-person wellness.
              therapist-finding:
                description: Navigating the practical process of locating, selecting, and vetting qualified therapists, including insurance networks, cost structures, credentials, specialties, and scheduling initial consultations.
              therapy-preparation:
                description: Preparing for therapy sessions by setting clear goals, organizing topics to discuss, understanding session flow, and managing expectations about the therapeutic relationship and process.
              online-therapy:
                description: Accessing mental health services through telehealth platforms, video sessions, therapy apps, and digital tools, including technology setup, platform security, and adapting to remote therapeutic environments.
              therapy-progress:
                description: Tracking therapeutic outcomes and milestones through session notes, homework assignments, progress assessments, and measuring treatment effectiveness over time to optimize the therapy experience.
          anxiety:
            description: Anxiety management, panic attacks, generalized anxiety, social anxiety.
            children:
              panic-attacks:
                description: Acute episodes of intense fear with physical symptoms like chest pain and shortness of breath, focusing on immediate management and trigger identification.
                children:
                  panic-attack-symptoms:
                    description: Recognizing and distinguishing the acute physical and psychological manifestations of panic attacks, including chest pain, dizziness, derealization, and their differentiation from medical emergencies.
                  panic-attack-techniques:
                    description: Immediate in-the-moment strategies and exercises such as breathing patterns, grounding techniques, and cognitive refocusing to manage and de-escalate an active panic attack.
                  panic-attack-triggers:
                    description: Identifying and analyzing personal patterns, situational cues, internal sensations, and environmental factors that precipitate or increase susceptibility to panic episodes.
                  panic-attack-aftercare:
                    description: Post-episode recovery strategies including emotional regulation, physical restoration, cognitive processing of the experience, and preventing subsequent attacks.
              social-anxiety:
                description: Fear and avoidance of social or performance situations where embarrassment might occur, including public speaking and interpersonal interactions.
                children:
                  performance-anxiety:
                    description: Fear of being negatively evaluated during public presentations, speeches, or performances where one is the center of attention and expected to deliver.
                  interaction-anxiety:
                    description: Apprehension about initiating or maintaining conversations, dating, meeting new people, or engaging in small talk due to fear of saying something embarrassing.
                  observation-anxiety:
                    description: Discomfort and self-consciousness when being watched while performing everyday activities like eating, writing, or working in front of others.
                  social-avoidance:
                    description: Behavioral patterns of evading social situations, making excuses to skip events, or using safety behaviors like avoiding eye contact to minimize anxiety.
              generalized-anxiety:
                description: Persistent, excessive worry about everyday life events and activities that is difficult to control and lasts for months.
              phobias-specific:
                description: Intense, irrational fear of specific objects or situations such as heights, flying, or animals, leading to active avoidance behavior.
              anxiety-triggers:
                description: Identifying and understanding specific situations, thoughts, or environmental factors that precipitate or worsen anxiety symptoms.
          depression:
            description: Depression, mood disorders, treatment, recovery.
            children:
              symptoms-diagnosis:
                description: Questions about recognizing depression symptoms, screening tools, and the diagnostic process for mood disorders.
              types-depression:
                description: Inquiries about different forms of depression including major depressive disorder, persistent depression, seasonal affective disorder, and postpartum depression.
                children:
                  major-depressive-disorder:
                    description: Inquiries about major depressive disorder, characterized by severe and persistent low mood, anhedonia, and other symptoms that significantly impair daily functioning for at least two weeks.
                    children:
                      symptoms-diagnosis:
                        description: Questions about recognizing the signs of major depressive disorder, understanding DSM-5 diagnostic criteria, differentiating from normal sadness or other conditions, and the process of getting a professional evaluation.
                      treatment-options:
                        description: Inquiries about evidence-based treatments including antidepressant medications, cognitive behavioral therapy, electroconvulsive therapy, transcranial magnetic stimulation, and combined approaches for managing major depressive disorder.
                      causes-risk-factors:
                        description: Questions about the biological mechanisms, genetic predisposition, childhood trauma, chronic stress, and other psychological or environmental factors that increase vulnerability to developing major depressive disorder.
                      relapse-prevention:
                        description: Inquiries about strategies to prevent recurrence of depressive episodes, including maintenance therapy, lifestyle modifications, early warning sign monitoring, and long-term management plans for sustained recovery.
                  persistent-depressive-disorder:
                    description: Questions regarding persistent depressive disorder or dysthymia, a chronic form of depression lasting two years or more with milder but enduring symptoms.
                  seasonal-affective-disorder:
                    description: Queries about seasonal affective disorder, a type of depression that occurs at specific times of year, typically in winter months with reduced sunlight exposure.
                  postpartum-depression:
                    description: Inquiries concerning postpartum depression, a mood disorder affecting individuals after childbirth with symptoms beyond typical 'baby blues' lasting weeks to months.
                  psychotic-depression:
                    description: Questions about psychotic depression, a severe form of major depression accompanied by hallucinations, delusions, or other psychotic features.
              depression-daily-living:
                description: Practical challenges and strategies for managing everyday activities, responsibilities, and self-care while experiencing depression.
              depression-support-systems:
                description: Seeking and navigating support from friends, family, support groups, and community resources specifically for depression.
              depression-causes-risk-factors:
                description: Understanding biological, psychological, and environmental factors that contribute to developing depression.
          stress-management:
            description: Stress reduction, work-life balance, burnout, recovery.
            children:
              workplace-stress:
                description: Queries about managing job pressure, deadlines, difficult coworkers, career-related anxiety, and occupational burnout.
              relaxation-techniques:
                description: Questions about specific physiological calming methods like deep breathing exercises, progressive muscle relaxation, and guided imagery for immediate tension relief.
              burnout-recovery:
                description: Focus on healing from severe exhaustion, cynicism, and reduced professional efficacy, including recovery timelines and rebuilding energy.
              boundary-setting:
                description: How to establish work-life limits, say no to requests, manage digital notifications, and protect personal time from professional demands.
              stress-triggers:
                description: Identifying personal stressors, recognizing early warning signs, tracking patterns, and understanding root causes of stress responses.
              lifestyle-adjustments:
                description: Using exercise, sleep hygiene, nutrition, and daily routines to build resilience and reduce baseline stress levels.
          mindfulness:
            description: Meditation, mindfulness practices, present-moment awareness.
            children:
              meditation-techniques:
                description: Core formal meditation practices including breath awareness, body scan, loving-kindness, and open monitoring that develop present-moment attention.
                children:
                  concentration-meditation:
                    description: Practices that train attention by focusing on a single object like the breath, a mantra, or a visual point to develop mental stability and one-pointed awareness.
                  insight-meditation:
                    description: Techniques that cultivate open, non-judgmental awareness of all present-moment experiences including thoughts, sensations, and emotions to develop wisdom and understanding.
                  heartfulness-meditation:
                    description: Methods focused on cultivating positive emotional states, compassion, loving-kindness, gratitude, and forgiveness toward oneself and others.
                  body-centered-meditation:
                    description: Practices that develop awareness through systematic attention to physical sensations, body scan, progressive muscle relaxation, and embodiment techniques.
                  movement-meditation:
                    description: Techniques that integrate mindful awareness with physical movement such as walking meditation, yoga, tai chi, or qigong to develop presence through motion.
              mindful-living:
                description: Applying mindfulness to everyday activities such as eating, walking, working, and communication to integrate awareness into daily routines.
              guided-resources:
                description: Audio recordings, mobile apps, videos, and online platforms that provide structured meditation sessions with instructor-led guidance.
              mindfulness-programs:
                description: Structured courses like MBSR, MBCT, and residential retreats offering systematic mindfulness training over multiple weeks or intensive periods.
              mindfulness-science:
                description: Scientific research on neural mechanisms, psychological outcomes, and clinical evidence supporting mindfulness effectiveness for mental health.
          medication-mental:
            description: Psychiatric medications, SSRIs, dosing, side effects.
            children:
              medication-types:
                description: Specific classes of psychiatric medications including SSRIs, SNRIs, MAOIs, atypical antipsychotics, and mood stabilizers, their mechanisms, and choosing between them.
              side-effects:
                description: Adverse reactions from psychiatric medications such as weight gain, sexual dysfunction, emotional blunting, and strategies for managing or mitigating these unwanted effects.
              dosing-tapering:
                description: Dosage adjustments, titration schedules, tapering protocols, and discontinuation symptoms for safely starting, changing, or stopping psychiatric medications.
              medication-efficacy:
                description: Onset of therapeutic effects, expected timelines for improvement, treatment-resistant cases, and evaluating whether a psychiatric medication is working effectively.
          trauma-recovery:
            description: PTSD, trauma processing, EMDR, grief.
            children:
              ptsd-management:
                description: Understanding PTSD symptoms, diagnosis criteria, and evidence-based treatment approaches including medication and therapy options for post-traumatic stress disorder.
              emdr-therapy:
                description: Eye Movement Desensitization and Reprocessing techniques, protocols, finding qualified practitioners, and understanding the eight-phase approach to trauma processing.
              childhood-trauma:
                description: Healing from adverse childhood experiences, developmental trauma, attachment wounds, and the long-term impact of early life abuse or neglect on adult functioning.
              complex-trauma:
                description: Recovery from complex PTSD and multiple or prolonged traumatic events, including relational trauma, captivity situations, and the distinct challenges of cumulative stress disorders.
              grief-recovery:
                description: Processing traumatic grief and loss, distinguishing between normal bereavement and trauma-related mourning, and navigating complicated grief reactions after sudden or violent death.
          mood-tracking:
            description: Mood journals, emotion tracking, pattern recognition.
            children:
              tracking-methods:
                description: Tools and mediums for recording mood data, including mobile apps, paper journals, wearable devices, voice notes, and spreadsheet-based tracking systems.
              mood-scales:
                description: Rating frameworks for quantifying emotional states, such as numeric scales, color-coded gradients, emoji selectors, and custom descriptive intensity levels.
              pattern-insights:
                description: Analysis of mood history to identify trends, cycles, correlations with external factors, and predictive patterns in emotional fluctuations.
              trigger-context:
                description: Logging situational and environmental variables that influence mood, including social interactions, sleep patterns, weather, activities, stressors, and physical health factors.
          coping-strategies:
            description: Coping skills, grounding techniques, emotional regulation.
            children:
              cognitive-reframing:
                description: Techniques for identifying and challenging negative thought patterns to alter emotional responses and build psychological resilience.
              grounding-techniques:
                description: Sensory-based exercises that anchor attention in the present moment to manage dissociation, anxiety, or overwhelming emotions.
              behavioral-activation:
                description: Structured engagement in meaningful activities to counteract depression, avoidance, and low motivation through positive reinforcement.
              somatic-regulation:
                description: Body-focused practices including breathwork, progressive muscle relaxation, and movement to directly influence physiological stress responses.
              social-support-seeking:
                description: Actively reaching out to trusted individuals or communities for emotional validation, practical assistance, or shared problem-solving.
          relationships-emotional:
            description: Emotional aspects of relationships — boundaries, attachment, empathy.

            children:
              attachment-patterns:
                description: Understanding how early bonding experiences shape adult relationship styles, including secure, anxious, avoidant, and disorganized attachment patterns and their impact on emotional connection.
              boundary-setting:
                description: Learning to establish and maintain healthy emotional limits with others, recognizing personal needs, and communicating them effectively to protect mental wellbeing.
              emotional-intimacy:
                description: Developing deep emotional closeness and vulnerability with others through authentic sharing, trust-building, and mutual understanding of inner experiences.
              empathy-validation:
                description: Practicing the skill of recognizing, understanding, and affirming another person's emotional reality without judgment or attempting to fix their feelings.
              codependency-recovery:
                description: Identifying and healing patterns of excessive emotional reliance on others, including caretaking, people-pleasing, and losing self-identity in relationships.
      # ---------- finances ----------
      finances:
        description: >
          Personal finance, budgeting, investments, retirement planning,
          taxes, major purchases, debt.
        children:
          budgeting:
            description: Household budgeting, expense tracking, monthly reviews.
            children:
              budget-creation:
                description: Establishing a new household budget by identifying income sources, listing fixed and variable expenses, and setting spending limits for each category.
              expense-tracking:
                description: Recording daily purchases and transactions to monitor actual spending against budgeted amounts and identify areas of overspending.
              budget-categories:
                description: Defining and optimizing allocation percentages for spending groups such as housing, food, transportation, entertainment, and savings.
              budget-reviews:
                description: Conducting monthly or quarterly assessments of budget performance, analyzing variances, and making adjustments for upcoming periods.
              budgeting-tools:
                description: Evaluating and using software applications, spreadsheets, or mobile apps to automate budget management and expense tracking.
          investing:
            description: Stocks, bonds, retirement accounts, index funds, portfolio allocation.
            children:
              stocks:
                description: Individual stocks, ETFs, brokerage accounts.
                children:
                  fundamental-analysis:
                    description: Evaluating individual stocks through financial statement analysis, valuation ratios like P/E and P/B, business model assessment, and competitive moat identification.
                  technical-analysis:
                    description: Predicting future stock price movements by studying historical charts, identifying patterns, and using indicators such as moving averages, RSI, and MACD for timing entries and exits.
                  dividend-stocks:
                    description: Building income-focused portfolios by selecting companies with sustainable dividend yields, strong payout histories, and healthy free cash flow generation.
                  growth-stocks:
                    description: Identifying high-potential companies expected to grow revenues and earnings faster than market averages, often reinvesting profits rather than paying dividends.
                  stock-screening:
                    description: Discovering investment opportunities by applying quantitative filters like market cap, sector, valuation metrics, and performance criteria to narrow the universe of tradable stocks.
              bonds:
                description: Treasury bonds, corporate bonds, bond funds.
              retirement-accounts:
                description: 401k, IRA, Roth, employer match, vesting.
                children:
                  account-types:
                    description: Differentiating between retirement account varieties such as Traditional IRA, Roth IRA, 401(k), 403(b), 457 plans, and SEP-IRAs based on eligibility, tax treatment, and employer sponsorship.
                  contribution-rules:
                    description: Annual contribution limits, catch-up provisions for older savers, income phase-out ranges for Roth IRA eligibility, and deadlines for making contributions to tax-advantaged retirement accounts.
                  employer-benefits:
                    description: Employer matching contribution formulas, vesting schedules that determine ownership of company contributions, profit-sharing provisions, and safe harbor requirements in workplace retirement plans.
                  withdrawals-and-penalties:
                    description: Premature distribution penalties, age-based withdrawal rules including required minimum distributions at age 73, hardship withdrawal criteria, and tax implications of taking money out before retirement.
                  rollovers-and-conversions:
                    description: Transferring funds between retirement accounts through direct rollovers from 401(k) to IRA, executing Roth conversions to shift tax-deferred savings into tax-free growth, and managing backdoor Roth strategies for high-income earners.
              real-estate-investing:
                description: Rental property, REITs, real estate investment.
              crypto:
                description: Cryptocurrency, wallets, exchanges, DeFi.
              index-funds:
                description: Index funds, three-fund portfolio, Bogleheads philosophy.
          taxes-personal:
            description: Tax preparation, deductions, tax-planning strategies.
            children:
              filing-process:
                description: Covers tax return preparation methods, filing deadlines, electronic filing options, and required documentation for submitting personal tax returns.
              deductions-credits:
                description: Focuses on identifying and claiming tax deductions and credits including itemized deductions, standard deduction, child tax credit, and education-related tax benefits.
              tax-planning:
                description: Addresses year-round strategies to minimize tax liability through income timing, retirement contributions, investment decisions, and estimated tax payments.
              income-reporting:
                description: Handles classification and reporting of various income types such as wages, self-employment earnings, investment income, rental income, and cryptocurrency gains.
              irs-issues:
                description: Deals with tax problems including audits, notices, payment plans, penalty abatement, and resolving disputes with tax authorities.
          debt-management:
            description: Credit card debt, student loans, mortgages, payoff strategies.
            children:
              debt-consolidation:
                description: Combining multiple debts into a single loan or payment plan to simplify repayment and potentially lower interest rates.
              debt-payoff-strategies:
                description: Methods like debt avalanche or debt snowball for prioritizing and eliminating debts efficiently.
              credit-card-debt:
                description: Specific challenges and solutions for managing revolving high-interest credit card balances.
              student-loan-debt:
                description: Federal and private student loan repayment options, forgiveness programs, and refinancing.
              mortgage-debt:
                description: Home loan management, refinancing, and strategies for paying off mortgage principal faster.
          major-purchases:
            description: Home buying, car buying, major appliances, big-ticket decisions.
            children:
              home-purchase:
                description: Financing, mortgages, down payments, closing costs, and decision-making for buying a house or other real estate property.
              vehicle-purchase:
                description: Auto loans, leasing vs buying, new vs used, negotiation, and financing options for cars, trucks, and motorcycles.
              appliance-purchase:
                description: Selecting, financing, and maintaining large household appliances like refrigerators, washers, dryers, and HVAC systems.
              electronics-purchase:
                description: High-cost consumer electronics such as televisions, computers, smartphones, and home theater systems, including warranties and upgrade cycles.
              furniture-purchase:
                description: Financing and selecting major furniture pieces and home furnishings, including mattresses, sofas, and whole-home setups.
          retirement-planning:
            description: Retirement number, FIRE, Social Security, drawdown strategy.
            children:
              retirement-goals:
                description: Calculating retirement savings targets, determining your "number", and setting financial milestones for retirement readiness.
              fire-movement:
                description: Financial Independence Retire Early strategies, including lean FIRE, fat FIRE, and early withdrawal tactics before traditional retirement age.
              social-security:
                description: Optimizing Social Security benefits, claiming strategies, spousal benefits, and understanding how benefits are calculated.
              withdrawal-strategies:
                description: Managing retirement account drawdowns, sequence of returns risk, bucket strategies, and sustainable withdrawal rates like the 4% rule.
              retirement-accounts:
                description: Navigating 401(k), IRA, Roth IRA, and other tax-advantaged accounts including contributions, rollovers, and employer matches.
          insurance:
            description: Health, life, disability, property insurance, coverage decisions.
            children:
              health-insurance:
                description: Navigating medical, dental, and vision insurance plans, including employer-sponsored and marketplace options, premium costs, deductible strategies, network provider selection, prescription drug coverage, and claims reimbursement processes.
              life-insurance:
                description: Evaluating term, whole, and universal life insurance policies for income replacement and estate planning, determining appropriate death benefit amounts, designating beneficiaries, understanding premium structures, and managing policy loans and cash value.
              disability-insurance:
                description: Securing short-term and long-term disability income protection, assessing elimination periods, benefit duration and amounts, own-occupation versus any-occupation definitions, and coordinating coverage with employer-provided and individual policies.
              property-insurance:
                description: Protecting homes, vehicles, and personal property through homeowners, renters, and auto insurance, analyzing coverage limits, deductibles, actual cash value versus replacement cost, and filing claims for damage, theft, or loss.
              liability-insurance:
                description: Managing personal liability risks and umbrella insurance policies that provide excess coverage beyond home and auto limits, protecting assets from lawsuits, legal judgments, and catastrophic financial exposure.
          banking:
            description: Checking, savings, high-yield, banks vs credit unions.
            children:
              account-types:
                description: Comparing checking, savings, money market, and certificate of deposit accounts to determine which suits specific financial needs and goals.
              institution-selection:
                description: Evaluating traditional banks versus credit unions and online institutions based on fees, interest rates, branch access, and membership eligibility.
              fee-management:
                description: Identifying common banking charges including overdraft, monthly maintenance, and ATM fees, plus strategies to minimize or eliminate these costs.
              digital-banking:
                description: Navigating mobile apps, online bill pay, remote deposit capture, peer-to-peer transfers, and digital security features offered by financial institutions.
              interest-rates:
                description: Understanding Annual Percentage Yield calculations, comparing high-yield account options, and maximizing interest earnings on deposited funds.
          credit:
            description: Credit scores, credit reports, credit cards, building credit.
            children:
              credit-scores:
                description: Understanding credit score calculation, factors that raise or lower scores, score ranges, and how scores impact loan approvals and interest rates.
              credit-reports:
                description: Accessing free credit reports from Equifax, Experian, and TransUnion, understanding report sections, and disputing inaccurate information.
              credit-cards:
                description: Comparing credit card offers, understanding APRs and fees, maximizing rewards programs, and managing multiple card accounts.
              credit-building:
                description: Strategies for establishing credit history from scratch, rebuilding credit after financial setbacks, and using secured cards or credit-builder loans.
              credit-monitoring:
                description: Setting up fraud alerts, placing credit freezes, monitoring for identity theft, and using credit monitoring services.
          estate-planning:
            description: Wills, trusts, beneficiaries, power of attorney.

            children:
              wills:
                description: Creating and updating last will and testament documents, including legal requirements, witnesses, holographic wills, and intestacy succession rules.
              trusts:
                description: Setting up revocable or irrevocable trusts, funding strategies, trustee selection, and using trusts to avoid probate or provide for special needs dependents.
              power-of-attorney:
                description: Establishing durable financial power of attorney and healthcare directives to authorize decision-making during periods of incapacity or medical emergency.
              beneficiaries:
                description: Managing beneficiary designations on retirement accounts, insurance policies, and financial assets, including contingent beneficiaries and per stirpes distribution methods.
              probate-process:
                description: Navigating court-supervised estate administration, executor responsibilities, probate costs, timelines, and strategies to minimize or bypass probate through non-probate transfers.
