      # ---------- personal-growth (NEW) ----------
      personal-growth:
        description: >
          Journaling, meditation, identity work, reflection, habits,
          mindset, productivity.
        children:
          journaling:
            description: Daily journal, gratitude journal, morning pages, reflection.
            children:
              gratitude-journaling:
                description: Recording daily appreciations and thankful moments to cultivate a positive mindset and recognize life's blessings.
              morning-pages:
                description: Writing three stream-of-consciousness pages immediately upon waking to clear mental clutter and access creativity without censorship or editing.
              bullet-journaling:
                description: Using rapid logging, symbols, and indexed collections to combine task management, scheduling, and mindful record-keeping in a customizable analog system.
              prompted-journaling:
                description: Responding to specific questions or structured prompts that guide your writing toward targeted insights, goals, or self-discovery topics.
              reflective-journaling:
                description: Processing and analyzing daily experiences, emotions, and decisions to extract lessons, identify patterns, and deepen self-awareness over time.
          meditation:
            description: Meditation practice, types of meditation, retreats.
            children:
              techniques:
                description: Specific meditation methods including mindfulness, loving-kindness, body scan, transcendental, Vipassana, and visualization practices for different goals and experience levels.
              guided-practice:
                description: Meditation sessions led by instructors through audio recordings, apps, videos, or live teaching, providing structure and guidance for practitioners.
              posture-breath:
                description: Physical aspects of meditation practice including sitting positions, breathing techniques, hand mudras, eye gaze, and managing physical discomfort or restlessness.
              retreats:
                description: Immersive meditation experiences from day-long workshops to multi-week residential silent retreats, covering logistics, preparation, etiquette, and post-retreat integration.
              obstacles:
                description: Common challenges in meditation such as mind wandering, drowsiness, inconsistency, difficult emotions, boredom, and practical strategies for troubleshooting these issues.
              philosophy-traditions:
                description: Historical and cultural contexts of meditation including Buddhist, Hindu, Taoist, Christian contemplative, and secular modern approaches, their principles and lineages.
          values-reflection:
            description: Values clarification, life direction, priorities.
            children:
              core-values-identification:
                description: Discovering and articulating one's fundamental beliefs and principles through exercises, assessments, and introspection to create a clear personal values framework.
              values-alignment:
                description: Evaluating and adjusting daily habits, career choices, relationships, and goals to ensure they consistently reflect and support one's established core values.
              values-based-prioritization:
                description: Using identified values as a decision-making filter to rank competing opportunities, allocate time and resources, and make trade-offs when faced with multiple important options.
              values-conflict-resolution:
                description: Navigating internal dilemmas where core values contradict each other or external situations where personal values clash with societal, workplace, or relationship expectations.
              purpose-meaning-connection:
                description: Exploring how personal values relate to broader life purpose, existential meaning, and long-term direction to create a coherent narrative for one's life journey.
          habits:
            description: Habit building, breaking habits, habit stacking, atomic habits.
            children:
              habit-formation:
                description: The process of creating and establishing new positive behaviors through repetition, willpower, and behavioral psychology techniques until they become automatic.
              habit-breaking:
                description: Strategies and methods for identifying, interrupting, and permanently eliminating unwanted or detrimental habitual behaviors and addictive patterns.
              habit-tracking:
                description: Monitoring and logging habit completion, streaks, and consistency over time using journals, apps, or visual systems to measure progress and maintain accountability.
              habit-stacking:
                description: Linking new habits to existing established routines by using current behaviors as triggers or anchors to build efficient chains of automatic actions.
              habit-cues:
                description: Environmental triggers, contextual signals, and antecedent prompts that initiate habitual behavior, including time, location, emotional states, and preceding actions.
          mindset:
            description: Growth mindset, cognitive reframing, mental models.
            children:
              fixed-vs-growth-mindset:
                description: Exploring the distinction between believing abilities are innate and static versus understanding they can be developed through effort, learning, and persistence.
              limiting-beliefs:
                description: Identifying and challenging deeply held assumptions about oneself and the world that constrain potential and prevent progress.
              mental-models:
                description: Learning and applying conceptual frameworks like first principles thinking, second-order effects, and inversion to improve decision-making and problem-solving.
              cognitive-biases:
                description: Recognizing systematic patterns of irrational thinking such as confirmation bias, sunk cost fallacy, and availability heuristic that distort judgment.
              self-talk:
                description: Examining and reshaping the internal narrative and automatic thoughts that influence confidence, motivation, and emotional responses.
          productivity:
            description: Productivity systems, GTD, time blocking, deep work.
            children:
              task-management:
                description: Systems and methods for capturing, organizing, prioritizing, and executing individual tasks and to-do items, including frameworks like Getting Things Done, the Eisenhower Matrix, and digital task managers.
              time-management:
                description: Techniques for allocating, scheduling, and protecting time on calendars, including time blocking, the Pomodoro Technique, batching similar activities, and managing deadlines.
              focus-concentration:
                description: Strategies for achieving and maintaining deep work, entering flow states, minimizing distractions, managing attention, and creating environments conducive to concentrated effort.
              energy-management:
                description: Approaches to optimizing physical and mental capacity through sleep, nutrition, exercise, strategic breaks, ultradian rhythm alignment, and recovery practices to sustain high performance.
              workflow-optimization:
                description: Methods for streamlining processes, automating repetitive tasks, creating templates, improving efficiency, and designing better systems for recurring work.
              goal-planning:
                description: Frameworks for setting, tracking, and achieving objectives at various time scales, including OKRs, quarterly planning, project breakdown, and progress measurement.
          self-help:
            description: Self-help books, frameworks, life advice.
            children:
              emotional-regulation:
                description: Techniques for managing difficult emotions, building emotional intelligence, and developing healthy coping mechanisms.
              relationship-advice:
                description: Guidance on improving communication, setting boundaries, and building healthier interpersonal connections.
              self-compassion:
                description: Practices for developing self-kindness, quieting the inner critic, and cultivating acceptance toward oneself.
              goal-setting:
                description: Frameworks for defining meaningful objectives, creating action plans, and tracking personal milestones.
              decision-making:
                description: Strategies for making better choices, overcoming analysis paralysis, and clarifying personal priorities.
          life-design:
            description: Designing your life, alternatives, life experiments.
            children:
              life-vision:
                description: Crafting a vivid, actionable long-term picture of your ideal future that guides decision-making and goal-setting across all life domains.
              lifestyle-design:
                description: Architecting daily routines, living situations, and resource allocation to create a sustainable way of living that expresses your values and priorities.
              life-experiments:
                description: Running small, reversible trials to test potential life changes before committing, using iterative feedback to refine your path forward.
              career-design:
                description: Intentionally shaping your professional trajectory by aligning work with identity, values, and desired lifestyle rather than following default paths.
              values-alignment:
                description: Systematically evaluating and adjusting life choices to ensure your actions, commitments, and direction consistently reflect your core personal values.
          reflection-practices:
            description: Weekly reviews, year reviews, retrospectives.

            children:
              periodic-reviews:
                description: Systematic reflection sessions conducted at regular intervals—daily, weekly, monthly, quarterly, or annually—to assess progress, celebrate wins, identify obstacles, and adjust goals across all life domains.
              project-retrospectives:
                description: Focused reflection meetings or personal exercises that analyze completed projects or initiatives to extract lessons learned, celebrate successes, identify process improvements, and inform future work.
              structured-frameworks:
                description: Reflection practices that follow specific, repeatable methodologies such as SWOT analysis, Start-Stop-Continue, the 4Ls (Liked, Learned, Lacked, Longed for), or the Rose-Thorn-Bud technique.
              values-alignment-check:
                description: Dedicated reflection sessions that evaluate whether recent decisions, behaviors, and life direction align with one's core personal values, identifying gaps and planning corrective actions.
              experiential-reflection:
                description: Ad-hoc reflection immediately following specific experiences—such as difficult conversations, meetings, presentations, or learning opportunities—to capture fresh insights and emotional responses for growth.
