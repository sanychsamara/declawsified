version: 0.2.0

# Hybrid taxonomy v0.2 — substantial expansion over v0.1.
#
# v0.1 was a 41-node sketch covering the obvious work/engineering and
# personal/health roots. The first Kimi-walker run on the Claude.ai export
# (data/claude/llm_classification_report.md) surfaced systematic gaps:
# mental-health, career-personal, spirituality, relationships, parenting,
# personal-growth, admin, community-service. Several misclassifications
# happened because the LLM had nowhere reasonable to land.
#
# This version addresses those gaps and adds 3-level depth for most
# branches. Specific deep specialization (sports/teams, programming-
# language frameworks, music genres, video-game subgenres, cuisines, etc.)
# happens via scripts/expand_taxonomy_kimi.py in a separate pass.

root:

  # =====================================================================
  # WORK
  # =====================================================================
  work:
    description: >
      Work-related categories: paid professional activities, engineering,
      research, business operations, legal, marketing, and other career-
      focused topics performed in a professional capacity.
    children:

      # ---------- engineering ----------
      engineering:
        description: >
          Software engineering, systems design, development. Programming,
          code, APIs, infrastructure, debugging, releases, technical
          architecture decisions.
        children:
          backend:
            description: >
              Backend services, REST/GraphQL APIs, microservices,
              databases, authentication, authorization, server-side logic.
            children:
              api-design:
                description: REST, GraphQL, gRPC API design, versioning, contracts.
                children:
                  rest-design:
                    description: RESTful resource modeling, HTTP semantics, and hypermedia controls for stateless API design.
                  graphql-design:
                    description: GraphQL schema architecture, query optimization, and resolver patterns for flexible data fetching.
                  grpc-design:
                    description: Protocol buffer definitions, service contracts, and streaming patterns for high-performance RPC APIs.
                  versioning-strategies:
                    description: API versioning approaches, deprecation policies, and migration paths for backward compatibility.
                  error-handling:
                    description: Error response structures, status codes, and idempotency patterns for reliable client-server communication.
                  documentation-discovery:
                    description: API documentation generation, SDK creation, and developer portal strategies for discoverability and adoption.
              databases:
                description: SQL and NoSQL databases, schema design, query optimization, migrations.
                children:
                  sql-databases:
                    description: Relational database management systems including PostgreSQL, MySQL, SQL Server, and Oracle, focusing on table structures, joins, ACID compliance, and SQL dialects.
                    children:
                      stored-programming:
                        description: Creating and managing stored procedures, functions, triggers, and packages to encapsulate business logic directly within the database engine.
                      views-materialized-views:
                        description: Designing and optimizing virtual views and materialized views with refresh policies for precomputed result sets in relational databases.
                      advanced-sql-constructs:
                        description: Leveraging window functions, common table expressions, recursive queries, and pivot operations for complex analytical and hierarchical data retrieval.
                      constraints-foreign-keys:
                        description: Implementing referential integrity through foreign key relationships, check constraints, unique constraints, and NOT NULL validations on table columns.
                      sql-dialects:
                        description: Navigating syntax variations, proprietary extensions, and feature differences across PostgreSQL, MySQL, SQL Server, and Oracle database systems.
                        children:
                          data-type-differences:
                            description: Differences in data type systems across SQL dialects, including PostgreSQL's JSONB/arrays, MySQL's UNSIGNED/ENUM, SQL Server's NVARCHAR/UNIQUEIDENTIFIER, and Oracle's VARCHAR2/NUMBER precision models.
                          proprietary-functions-operators:
                            description: Dialect-specific built-in functions and operators for string manipulation, date arithmetic, JSON processing, and mathematical operations that differ significantly between PostgreSQL, MySQL, SQL Server, and Oracle.
                          ddl-syntax-variations:
                            description: Variations in Data Definition Language syntax for CREATE/ALTER/DROP statements, including table/column options, constraint clauses, and schema object management commands unique to each database system.
                          transaction-isolation-control:
                            description: Differences in transaction control commands, isolation level implementations, locking behavior, and concurrency mechanisms across PostgreSQL, MySQL, SQL Server, and Oracle databases.
                          indexing-features:
                            description: Dialect-specific index types, creation syntax, and maintenance commands, covering PostgreSQL's GIN/GiST/BRIN, MySQL's FULLTEXT/spatial, SQL Server's clustered/columnstore, and Oracle's bitmap/function-based indexes.
                          query-optimizer-hints:
                            description: Proprietary optimizer hints and performance tuning directives, including Oracle's /*+ */ comment syntax, SQL Server's OPTION clause, MySQL's optimizer hints, and PostgreSQL's enable_* parameters.
                      connection-session-management:
                        description: Configuring connection pooling, managing persistent sessions, handling temporary tables, and controlling authentication for database client access.
                  nosql-databases:
                    description: Non-relational database systems including document stores like MongoDB, key-value stores like Redis, wide-column stores like Cassandra, and graph databases, focusing on flexible schemas and horizontal scaling.
                    children:
                      document-stores:
                        description: Document-oriented databases that store data in flexible, JSON-like documents, enabling dynamic schemas and complex nested structures.
                        children:
                          schema-design-patterns:
                            description: Strategies for structuring documents, including embedding versus referencing, denormalization techniques, and modeling hierarchical relationships within collections.
                          query-indexing-strategies:
                            description: Query languages and indexing approaches unique to document stores, such as multikey indexes on arrays, text search indexes, and geospatial queries on nested fields.
                          multi-document-transactions:
                            description: ACID transaction support across multiple documents, including isolation levels, concurrency control, and performance implications in document-oriented databases.
                          schema-migration-evolution:
                            description: Techniques for evolving document schemas over time, handling versioning, backward compatibility, and migrating existing documents to new structures.
                          aggregation-data-processing:
                            description: In-database data transformation and analytics capabilities, including pipeline-based aggregation frameworks for complex computations on document collections.
                      key-value-stores:
                        description: Simple NoSQL databases that store data as a collection of key-value pairs, optimized for high-speed lookups and caching use cases.
                        children:
                          in-memory-kv-stores:
                            description: Key-value stores designed for primary operation in RAM, offering sub-millisecond latency for caching, session management, and real-time data processing with optional persistence mechanisms.
                          persistent-kv-stores:
                            description: Key-value stores that guarantee data durability through disk-based storage, using write-ahead logging or similar techniques for crash recovery and long-term data retention.
                          distributed-kv-stores:
                            description: Key-value stores built to operate across multiple nodes with automatic data partitioning, replication, and failover capabilities for high availability and horizontal scalability.
                          ordered-kv-stores:
                            description: Key-value stores that maintain keys in sorted order, enabling efficient range scans, prefix queries, and ordered iteration while preserving the simple key-value abstraction.
                          caching-kv-stores:
                            description: Key-value stores optimized specifically for caching workloads with features like automatic expiration, eviction policies, memory management, and high throughput for read-heavy access patterns.
                      wide-column-stores:
                        description: NoSQL databases that store data in tables with flexible columns organized by column families, optimized for large-scale distributed storage and analytics.
                      graph-databases:
                        description: NoSQL databases designed for storing and querying highly connected data using nodes, edges, and properties to represent relationships.
                        children:
                          query-languages:
                            description: Syntax and capabilities of graph-specific query languages like Cypher, Gremlin, and SPARQL for retrieving and manipulating connected data.
                          graph-algorithms:
                            description: Implementation and optimization of computational algorithms such as shortest path, centrality, and community detection on graph structures.
                          data-modeling:
                            description: Design patterns for creating node labels, edge relationships, and property schemas to represent domain entities and their connections effectively.
                          performance-optimization:
                            description: Indexing strategies, query plan analysis, caching mechanisms, and hardware considerations for improving graph traversal speed and database responsiveness.
                          scaling-strategies:
                            description: Techniques for distributing graph data across multiple servers including sharding, partitioning, and federation to handle large datasets and high query loads.
                      consistency-models:
                        description: Understanding and configuring consistency guarantees in NoSQL systems, including eventual consistency, strong consistency, and the CAP theorem tradeoffs.
                      horizontal-scaling:
                        description: Strategies for distributing NoSQL data across multiple servers through sharding, partitioning, and replication to achieve elasticity and performance.
                  schema-design:
                    description: Designing database structures including tables, collections, relationships, constraints, normalization, and denormalization strategies for both SQL and NoSQL systems.
                  query-optimization:
                    description: Improving database query performance through execution plan analysis, rewriting queries, using appropriate operators, and understanding database engine internals.
                  migrations:
                    description: Evolving database schemas over time including version control, schema change deployment strategies, rollback procedures, and data transformation during updates.
                  indexing-strategies:
                    description: Creating and managing database indexes including B-tree, hash, and composite indexes, covering index selection, maintenance overhead, and performance trade-offs.
                  transactions-concurrency:
                    description: Managing concurrent database access including ACID properties, isolation levels, locking mechanisms, deadlocks, and optimistic versus pessimistic concurrency control.
              auth:
                description: Authentication, authorization, OAuth, JWT, session management, SSO.
                children:
                  authentication-mechanisms:
                    description: Covers user verification methods including passwords, multi-factor authentication, biometric systems, and passwordless approaches like magic links or WebAuthn.
                  authorization-models:
                    description: Focuses on access control patterns such as role-based access control (RBAC), attribute-based access control (ABAC), permission systems, and scope definitions for determining what authenticated users can do.
                  token-management:
                    description: Deals with generation, validation, rotation, and revocation of security tokens including JWTs, API keys, client certificates, and refresh token strategies.
                  auth-protocols:
                    description: Encompasses standard authentication and authorization protocols like OAuth 2.0, OpenID Connect, SAML 2.0, LDAP, and their specific flows and implementations.
                  session-handling:
                    description: Addresses server-side and client-side session management, cookie configuration, session storage backends, logout mechanisms, and handling session persistence across distributed systems.
                  sso-federation:
                    description: Covers Single Sign-On implementations, identity provider integration, federation patterns across multiple domains, and enterprise identity management solutions.
              performance:
                description: Backend performance tuning, caching, profiling, latency optimization.
                children:
                  profiling-monitoring:
                    description: Application performance measurement, bottleneck identification, and continuous monitoring using APMs, profilers, and distributed tracing to track latency, throughput, and resource utilization.
                  caching-strategies:
                    description: In-memory caches, CDN edge caching, cache key design, invalidation patterns, and TTL management to reduce redundant computation and database load for improved response times.
                  query-optimization:
                    description: Database index design, query plan analysis, connection pooling, N+1 query prevention, and ORM tuning to minimize data access latency and reduce query execution time.
                  concurrency-threading:
                    description: Thread pool sizing, connection pool management, async/await patterns, lock contention resolution, and parallel execution strategies to maximize resource utilization and request handling capacity.
                  memory-management:
                    description: Garbage collection tuning, memory leak detection, heap dump analysis, object pooling, and buffer management to reduce pause times and prevent out-of-memory failures.
                  async-processing:
                    description: Non-blocking I/O, event-driven architectures, message queue processing, and background job scheduling to improve system throughput and handle long-running operations without blocking request threads.
              messaging:
                description: Queues, pub/sub, event streaming, Kafka, RabbitMQ, async patterns.
                children:
                  message-brokers:
                    description: Comparison, selection, and operational concerns of specific messaging systems like Kafka, RabbitMQ, Pulsar, NATS, including deployment, clustering, and configuration.
                  event-streaming:
                    description: Real-time stream processing patterns, windowing, stateful operations, stream joins, and frameworks like Kafka Streams, Flink, Spark Streaming for continuous data flow.
                  async-patterns:
                    description: Reliability patterns including retry policies, dead-letter queues, idempotency, transactional outbox, sagas, and circuit breakers for robust asynchronous communication.
                  message-protocols:
                    description: Wire-level protocols and standards such as AMQP, MQTT, STOMP, NATS protocol, and WebSocket-based messaging, including their semantics and use cases.
                  schema-management:
                    description: Message serialization formats, schema definition with Avro, Protobuf, JSON Schema, schema evolution, compatibility rules, and registry implementations.
              storage:
                description: Object storage, blob stores, file systems, data lakes.
                children:
                  object-storage:
                    description: Questions about cloud object stores such as S3, GCS, and Azure Blob Storage, including their APIs, lifecycle policies, versioning, and access control mechanisms.
                  file-systems:
                    description: Questions about traditional and distributed file systems like NFS, HDFS, CephFS, and their mounting, permissions, protocols, and performance characteristics.
                  data-lakes:
                    description: Questions about large-scale analytics storage systems, including data lake architectures, formats like Parquet and Iceberg, and integration with query engines.
                  block-storage:
                    description: Questions about block-level storage devices such as EBS, persistent disks, and iSCSI volumes, focusing on provisioning, performance, and attachment to compute instances.
                  storage-cost-optimization:
                    description: Questions about reducing storage expenses through tiering, lifecycle policies, compression, and selecting appropriate storage classes and volume types.
          frontend:
            description: >
              User interfaces, web pages, browser behavior, client-side
              applications. React, Vue, Angular, Svelte, vanilla JS.
            children:
              frameworks:
                description: React, Vue, Angular, Svelte, Solid, framework choice and migration.
                children:
                  framework-comparison:
                    description: Evaluating and contrasting frontend frameworks like React, Vue, or Angular to inform technology selection decisions based on project requirements, team expertise, and long-term maintainability.
                  framework-migration:
                    description: Planning and executing migrations between frontend frameworks or across major versions, including code transformation strategies, risk assessment, and incremental adoption approaches.
                  framework-specific-patterns:
                    description: Implementing idiomatic design patterns and architectural approaches unique to specific frameworks, such as React hooks, Vue composition API, or Angular dependency injection.
                  framework-performance:
                    description: Optimizing rendering performance, bundle size, and runtime efficiency using framework-specific techniques like React.memo, Vue's reactivity system, or Angular's change detection strategies.
                  framework-ecosystem:
                    description: Navigating libraries, tools, and community resources that extend framework capabilities, including UI component libraries, state management integrations, and development utilities.
                  framework-architecture:
                    description: Structuring large-scale applications with framework-specific architectural patterns for component organization, module boundaries, and scalable code architecture.
              styling:
                description: CSS, Tailwind, CSS-in-JS, design tokens, responsive layout.
                children:
                  css-architecture:
                    description: CSS organization methodologies like BEM, SMACSS, and ITCSS for maintainable stylesheets.
                  css-frameworks:
                    description: Pre-built CSS frameworks including Bootstrap, Tailwind CSS, and Foundation for rapid development.
                  css-in-js:
                    description: Libraries such as styled-components, Emotion, and Stitches for writing CSS within JavaScript components.
                  design-systems:
                    description: Design tokens, theming, and component library creation for consistent visual identity.
                  responsive-layouts:
                    description: Responsive design patterns, media queries, fluid grids, and viewport handling for multi-device support.
              state-management:
                description: Redux, Zustand, signals, stores, client-side state architecture.
                children:
                  global-stores:
                    description: Patterns and libraries for managing application-wide state shared across components, including centralized stores, dispatch mechanisms, and subscription models like Redux, Zustand, or MobX.
                  async-state:
                    description: Strategies for handling asynchronous data fetching, loading states, error handling, and server-state synchronization using tools like React Query, SWR, or custom async reducers.
                  local-component-state:
                    description: Techniques for encapsulating state within individual components using hooks like useState and useReducer, focusing on scope, lifecycle, and when to keep state local versus global.
                  state-persistence:
                    description: Methods for saving and restoring state across page reloads, including localStorage, sessionStorage, URL state encoding, and SSR hydration patterns.
                  derived-computed-state:
                    description: Approaches for creating memoized, computed values and selectors that derive state from other sources, optimizing re-renders and preventing unnecessary calculations.
              accessibility:
                description: ARIA, screen readers, keyboard nav, WCAG compliance.
                children:
                  aria-patterns:
                    description: Implementing ARIA roles, states, and properties for custom widgets and complex UI components to communicate semantics to assistive technologies.
                  screen-reader-testing:
                    description: Debugging and testing web applications using screen readers to verify proper announcement of content, structure, and dynamic updates.
                  keyboard-navigation:
                    description: Designing focus management, tab order, keyboard shortcuts, and interaction models for users who navigate without a mouse.
                  wcag-compliance:
                    description: Interpreting and implementing Web Content Accessibility Guidelines criteria to achieve specific conformance levels and legal requirements.
                  color-contrast:
                    description: Evaluating and adjusting color combinations to meet WCAG contrast ratio requirements for text and interactive elements.
              build-tooling:
                description: Vite, webpack, esbuild, bundling, code splitting, tree shaking.
                children:
                  bundler-comparison:
                    description: Evaluating and selecting between bundlers like webpack, Vite, esbuild, Rollup, and Parcel based on performance, features, ecosystem, and project requirements.
                  optimization-strategies:
                    description: Implementing code splitting, tree shaking, minification, dead code elimination, and bundle analysis to reduce application size and improve load times.
                  dev-server-features:
                    description: Configuring hot module replacement (HMR), live reloading, fast refresh, dev server proxies, and HTTPS for efficient local development workflows.
                  plugin-configuration:
                    description: Managing loaders, plugins, transformers, and configuration files to extend bundler capabilities for handling custom file types and build transformations.
                  build-performance:
                    description: Optimizing build speed through caching, incremental builds, parallel processing, build profiling, and CI/CD pipeline tuning for faster compilation and deployment.
              forms-validation:
                description: Form handling, validation, React Hook Form, controlled vs uncontrolled.
                children:
                  validation-libraries:
                    description: Comparison and implementation of form validation libraries such as React Hook Form, Formik, and React Final Form, including their APIs and performance characteristics.
                  validation-schemas:
                    description: Defining validation rules using schema builders like Yup, Zod, or Joi to create type-safe, reusable validation logic for form inputs.
                  error-handling:
                    description: Displaying validation error messages to users, including UI patterns for inline errors, summary lists, and accessible error announcements.
                  form-state:
                    description: Tracking form metadata including dirty fields, touched states, submission status, and pristine conditions to control UI behavior and validation timing.
                  async-validation:
                    description: Implementing asynchronous validation rules that require server-side checks, such as username availability or email uniqueness, with loading states and debouncing.
          devops:
            description: >
              Deployment, CI/CD, infrastructure-as-code, monitoring,
              observability, container orchestration.
            children:
              ci-cd:
                description: GitHub Actions, GitLab CI, Jenkins, build pipelines, release automation.
                children:
                  pipeline-configuration:
                    description: Writing and maintaining pipeline definitions using YAML or DSL syntax, including job orchestration, stage definitions, workflow triggers, and pipeline-as-code best practices for GitHub Actions, GitLab CI, and Jenkins.
                  build-automation:
                    description: Compiling source code, managing dependencies, running build tools like Maven or Webpack, creating artifacts, and handling multi-platform builds within CI pipelines.
                  testing-automation:
                    description: Executing automated test suites including unit, integration, and end-to-end tests, generating coverage reports, and implementing quality gates that block deployments on test failures.
                  deployment-automation:
                    description: Delivering applications to target environments using strategies like blue-green or canary deployments, managing release approvals, and orchestrating multi-stage rollouts across development, staging, and production.
                  secrets-management:
                    description: Securely storing and accessing sensitive credentials, API keys, and certificates within CI/CD pipelines, integrating with vaults like HashiCorp Vault or cloud secret managers, and preventing secret leakage in logs.
                  runner-agents:
                    description: Provisioning and managing the compute infrastructure that executes pipeline jobs, including self-hosted runners, cloud-based agents, scaling policies, and agent pool configuration for different workload types.
              kubernetes:
                description: K8s clusters, deployments, services, helm charts, operators.
                children:
                  cluster-management:
                    description: Managing Kubernetes cluster lifecycle, nodes, upgrades, control plane configuration, and addon operations.
                  application-deployment:
                    description: Deploying and managing workloads using pods, deployments, statefulsets, daemonsets, jobs, and cronjobs.
                  networking:
                    description: Configuring service discovery, ingress controllers, load balancers, network policies, and pod-to-pod communication.
                  storage:
                    description: Managing persistent volumes, storage classes, volume claims, and mounting configuration data for stateful applications.
                  security:
                    description: Implementing RBAC, pod security standards, secrets encryption, network policies, and cluster hardening practices.
                  troubleshooting:
                    description: Diagnosing pod failures, connectivity issues, resource constraints, and debugging cluster component health problems.
              docker:
                description: Containers, Dockerfiles, image optimization, registries.
                children:
                  dockerfile-authoring:
                    description: Questions about writing and structuring Dockerfiles, including syntax, instructions, multi-stage builds, layer caching, and Dockerfile linting best practices.
                  image-management:
                    description: Building, tagging, scanning for security vulnerabilities, optimizing image size and layers, and distributing images to and from registries.
                  container-runtime:
                    description: Running containers with docker run and docker create, managing container lifecycle, setting resource constraints, configuring restart policies, and understanding container isolation.
                  container-networking:
                    description: Configuring Docker network drivers, port mapping and publishing, container DNS resolution, and enabling communication between containers and external systems.
                  volume-storage:
                    description: Managing persistent data using named volumes, bind mounts, and tmpfs, understanding storage drivers, and handling data backup and migration for containers.
              terraform:
                description: Infrastructure-as-code, Terraform, Pulumi, CDK, cloud provisioning.
                children:
                  state-management:
                    description: Managing terraform.tfstate files, remote backends like S3 or Terraform Cloud, state locking mechanisms, and terraform state command operations for manipulating state.
                  modules:
                    description: Creating reusable module abstractions, consuming modules from public or private registries, implementing module composition patterns, and managing module versioning.
                  providers:
                    description: Configuring provider authentication and settings, using multiple providers in a single configuration, developing custom providers, and managing provider versions and plugins.
                  hcl-authoring:
                    description: Writing Terraform configuration using HashiCorp Configuration Language syntax, defining resources, data sources, variables, outputs, and using built-in functions and expressions.
                  troubleshooting:
                    description: Debugging terraform plan and apply failures, diagnosing provider errors, resolving resource drift and state inconsistencies, and using terraform import and refresh commands.
              monitoring:
                description: Prometheus, Grafana, Datadog, alerting, dashboards, SLOs.
                children:
                  metrics-collection:
                    description: Configuring scrapers, exporters, and time-series databases to gather and store numerical metrics from infrastructure and applications.
                  alerting-routing:
                    description: Defining alert rules, thresholds, and notification policies to route alerts to PagerDuty, Slack, or other channels.
                  dashboards-visualization:
                    description: Building interactive charts, graphs, and panels in Grafana or similar tools to visualize metrics and system status.
                  slo-sli-tracking:
                    description: Defining service level indicators and objectives, managing error budgets, and tracking reliability targets.
                  synthetic-monitoring:
                    description: Simulating user requests and probing endpoints to test availability, latency, and functionality from external vantage points.
              observability:
                description: Logging, distributed tracing, OpenTelemetry, structured logs.
                children:
                  log-management:
                    description: Storing, indexing, and querying application logs using tools like ELK stack, Loki, or Splunk for troubleshooting and analysis.
                  distributed-tracing:
                    description: Tracking requests across microservices to identify latency bottlenecks and understand service dependencies using tools like Jaeger and Zipkin.
                  metrics-collection:
                    description: Collecting and analyzing time-series performance indicators such as CPU, memory, request rates, and custom business metrics with Prometheus and Grafana.
                  instrumentation:
                    description: Adding observability code to applications through manual instrumentation, auto-instrumentation agents, and OpenTelemetry SDKs for generating telemetry data.
                  observability-data-pipeline:
                    description: Ingesting, processing, and routing telemetry data from multiple sources to backend systems using OpenTelemetry Collector, Fluentd, or Vector.
              sre:
                description: Site reliability, incident response, postmortems, runbooks, on-call.
                children:
                  incident-management:
                    description: Coordinating real-time response to production incidents including detection, escalation, communication, and resolution procedures.
                  postmortem-culture:
                    description: Facilitating blameless retrospective analyses of incidents to extract systemic lessons and drive organizational learning without finger-pointing.
                  runbook-automation:
                    description: Developing executable, code-driven operational procedures that automate routine maintenance tasks and incident remediation steps.
                  on-call-operations:
                    description: Designing and managing engineer rotation schedules, escalation chains, and incident response responsibilities for 24/7 service coverage.
                  service-level-objectives:
                    description: Defining measurable reliability targets through SLIs and SLOs, tracking error budgets, and balancing feature development against stability requirements.
          mobile:
            description: >
              Mobile applications for iOS and Android, cross-platform
              frameworks, mobile-specific UX and lifecycle.
            children:
              ios:
                description: iOS development, Swift, SwiftUI, UIKit, App Store.
                children:
                  swift-language:
                    description: Questions about Swift programming language syntax, features, optionals, concurrency, generics, and language-specific concepts for iOS development.
                  swiftui:
                    description: User interface development using SwiftUI framework, including views, modifiers, state management, and declarative UI patterns for iOS apps.
                  uikit:
                    description: User interface development using UIKit framework, including view controllers, storyboards, Auto Layout, and imperative UI programming for iOS.
                  app-store-distribution:
                    description: App Store submission process, provisioning profiles, code signing, App Store Connect, TestFlight, and iOS app distribution logistics.
                  ios-architecture:
                    description: Application architecture patterns like MVVM, MVC, Coordinator, dependency injection, and structuring iOS app codebases for maintainability.
                  ios-frameworks:
                    description: Apple's system frameworks and APIs including Core Data, Core Animation, Combine, ARKit, Core ML, and other iOS-specific libraries.
              android:
                description: Android development, Kotlin, Jetpack Compose, Play Store.
                children:
                  jetpack-compose:
                    description: Declarative UI toolkit for building native Android interfaces with composable functions, state management, and Material Design components.
                  architecture-components:
                    description: AndroidX libraries for lifecycle-aware components, data persistence with Room, navigation graphs, and MVVM architecture patterns.
                  kotlin-android:
                    description: Kotlin coroutines, flows, extension functions, and idiomatic patterns specific to Android development and Android KTX libraries.
                  play-store-distribution:
                    description: App signing, release management, Play Console operations, store listing optimization, and compliance with Google Play policies.
                  testing-android:
                    description: JUnit, Espresso, UI Automator, Robolectric, and other frameworks for unit, integration, and end-to-end testing of Android applications.
                  performance-optimization:
                    description: Memory profiling, battery usage reduction, APK size optimization, cold start improvements, and ANR debugging techniques.
              react-native:
                description: React Native cross-platform mobile apps.
                children:
                  navigation:
                    description: React Native navigation libraries and patterns for building in-app routing, screen transitions, and deep linking across iOS and Android platforms.
                  state-management:
                    description: State management patterns and libraries like Redux, Zustand, and Context API for managing application data flow in React Native apps.
                  native-modules:
                    description: Bridging JavaScript with native iOS and Android code through custom native modules and third-party native libraries integration.
                  performance:
                    description: Optimizing React Native application performance including startup time, memory usage, JavaScript thread optimization, and native rendering bottlenecks.
                  expo:
                    description: Using Expo framework including managed workflow, Expo SDK libraries, EAS build services, and Expo Go development client.
              flutter:
                description: Flutter, Dart, cross-platform mobile and web.
                children:
                  widgets:
                    description: Building and composing Flutter widgets, creating custom UI elements, managing layouts, and implementing animations.
                  state-management:
                    description: Implementing reactive state management patterns including Provider, Riverpod, Bloc, Redux, and managing application state across widgets.
                  navigation:
                    description: Configuring route management, screen transitions, deep linking, and navigation stacks in Flutter applications.
                  platform-integration:
                    description: Accessing native platform features through platform channels, using device APIs, and integrating OS-specific functionality.
                  performance:
                    description: Profiling and optimizing Flutter app performance, addressing jank, reducing app size, and improving rendering efficiency.
              mobile-ux:
                description: Mobile UX patterns, gestures, navigation, push notifications.
                children:
                  navigation:
                    description: Mobile navigation patterns including tab bars, hamburger menus, bottom sheets, and gesture-based flows between screens.
                  gestures:
                    description: Touch interaction patterns like swipes, pinches, long presses, and drag gestures, including detection, feedback, and conflict resolution.
                  push-notifications:
                    description: Notification permission strategies, content timing, deep linking, grouping, and managing user notification preferences.
                  onboarding:
                    description: First-launch experiences including welcome screens, feature tutorials, permission priming, and progressive disclosure for new users.
                  accessibility:
                    description: Mobile-specific accessibility features like VoiceOver/TalkBack support, dynamic type, touch target sizes, and color contrast compliance.
          data-engineering:
            description: >
              Data pipelines, ETL, warehouses, streaming systems,
              analytics infrastructure, big data processing.
            children:
              etl:
                description: ETL/ELT pipelines, Airflow, dbt, data transformation.
                children:
                  transformation-logic:
                    description: Implementing business rules and data transformations using SQL, Python, or dbt models within ETL pipelines, including cleaning, aggregation, and enrichment operations.
                  data-quality:
                    description: Validating data integrity, schema conformance, and business rule compliance within ETL processes through profiling, anomaly detection, and automated quality checks.
                  ingestion-connectors:
                    description: Configuring and managing connections to source systems including databases, APIs, and file stores for data extraction in ETL pipelines.
                  performance-optimization:
                    description: Tuning ETL job execution through query optimization, parallelization, resource allocation, and infrastructure scaling to improve throughput and reduce latency.
                  batch-patterns:
                    description: Designing batch-oriented ETL strategies including incremental loads, slowly changing dimensions, snapshot management, and processing window definitions.
              warehouses:
                description: Snowflake, BigQuery, Redshift, data warehouse design.
                children:
                  performance-optimization:
                    description: Tuning query speed, reducing costs, and optimizing resource utilization in data warehouses through indexing, clustering, partitioning, and query rewriting techniques.
                  schema-modeling:
                    description: Designing dimensional models, star and snowflake schemas, data vault architectures, and table structures to optimize analytical query performance and data organization.
                  cost-management:
                    description: Monitoring, analyzing, and controlling cloud warehouse expenses through query optimization, storage lifecycle policies, resource right-sizing, and pricing model understanding.
                  security-access-control:
                    description: Implementing role-based permissions, row-level security, data masking, encryption, and compliance auditing to protect sensitive data within warehouse environments.
                  external-data-integration:
                    description: Querying external data sources and data lakes directly from warehouses using federated queries, external tables, and features like Redshift Spectrum or BigQuery Omni.
              streaming:
                description: Kafka, Kinesis, Flink, real-time data pipelines.
                children:
                  stream-processing-frameworks:
                    description: Tools and frameworks for processing data streams like Apache Flink, Spark Streaming, and Kafka Streams, including their APIs and deployment models.
                  message-brokers:
                    description: Distributed messaging systems such as Apache Kafka, AWS Kinesis, and Apache Pulsar that provide the backbone for streaming data ingestion and transport.
                  stream-connectors:
                    description: Integration components and connectors for ingesting data from sources or sinking to destinations, including Kafka Connect and custom integrations.
                  stream-processing-patterns:
                    description: Common design patterns for streaming applications including windowing, watermarks, stateful processing, and exactly-once delivery semantics.
                  stream-observability:
                    description: Monitoring, logging, and troubleshooting streaming pipelines, including metrics like lag, throughput, and latency, plus tools for alerting and debugging.
              data-lakes:
                description: Data lakes, lakehouse, Iceberg, Delta, Parquet.
                children:
                  table-formats:
                    description: Questions about Apache Iceberg, Delta Lake, Apache Hudi, and other table formats that provide ACID transactions, schema evolution, and time travel capabilities on data lake storage.
                  ingestion:
                    description: Questions about loading data into data lakes, including batch ingestion, streaming ingestion, change data capture, and tools like Spark, Flink, or cloud-native services.
                  query-engines:
                    description: Questions about querying data lake contents using SQL engines such as Presto, Trino, Amazon Athena, Azure Synapse, or Spark SQL for analytics and BI workloads.
                  governance:
                    description: Questions about managing data lake security, access control, data cataloging, metadata management, lineage tracking, and regulatory compliance.
                  lakehouse:
                    description: Questions about implementing lakehouse architecture that combines the low-cost storage of data lakes with the transactional and performance features of data warehouses.
              orchestration:
                description: Job scheduling, DAG orchestration, dependency management.
                children:
                  workflow-definition:
                    description: Creating and structuring DAGs, tasks, and dependency graphs using Python code, YAML configuration, or visual designers in orchestration systems.
                  execution-engines:
                    description: Comparing and operating orchestration platforms like Airflow, Prefect, Dagster, Luigi, or cloud-managed services for running data pipelines.
                  scheduling-triggers:
                    description: Configuring time-based schedules, cron expressions, event-driven triggers, and sensors to initiate pipeline runs based on external conditions.
                  monitoring-observability:
                    description: Tracking DAG runs, task execution states, viewing logs, setting up alerts, and analyzing performance metrics for operational visibility.
                  error-handling-retries:
                    description: Implementing retry policies, failure callbacks, SLA monitoring, and strategies for handling task failures and pipeline recovery.
          security:
            description: >
              Application security, vulnerability analysis, authentication
              flows, cryptography, threat modeling.
            children:
              appsec:
                description: Application security, OWASP top 10, SAST, DAST, code review.
                children:
                  static-analysis:
                    description: Configuration, execution, and triage of SAST tools that analyze source code, bytecode, or binaries for vulnerabilities without running the application.
                  dynamic-testing:
                    description: Deployment and results analysis of DAST tools that test running applications through simulated attacks to find runtime security flaws.
                  dependency-scanning:
                    description: Identification and remediation of vulnerabilities in third-party libraries, frameworks, and supply chain components using SCA tools.
                  api-security:
                    description: Protection of REST, GraphQL, and gRPC endpoints through authentication, rate limiting, input validation, and access control mechanisms.
                  secrets-detection:
                    description: Scanning repositories and CI/CD pipelines for hardcoded credentials, API keys, and sensitive tokens to prevent credential leakage.
                  authentication-authorization:
                    description: Implementation and auditing of user authentication, session management, permission models, and OAuth/JWT flows.
              infrasec:
                description: Infrastructure security, network policies, IAM, secrets management.
                children:
                  network-security:
                    description: Infrastructure network security encompassing firewalls, VPC configurations, network segmentation, zero-trust architectures, and traffic inspection policies to control east-west and north-south communication.
                  iam:
                    description: Identity and access management for infrastructure systems including human and machine identity provisioning, RBAC/ABAC policy design, permission auditing, and credential lifecycle automation.
                  secrets-management:
                    description: Secure storage, rotation, and distribution of sensitive credentials, API keys, TLS certificates, and cryptographic material with audit trails and access controls.
                  cloud-security:
                    description: Cloud platform security posture management across multi-cloud environments including configuration hardening, misconfiguration detection, CSPM implementation, and native security service orchestration.
                  security-monitoring:
                    description: Continuous security observability through log aggregation, SIEM deployment, intrusion detection systems, anomaly detection, and incident response automation for infrastructure.
              cryptography:
                description: Encryption, key management, TLS, signing, hashing.
                children:
                  symmetric-crypto:
                    description: Symmetric encryption algorithms and modes including AES, ChaCha20, and block cipher modes of operation for data confidentiality with shared secret keys.
                  asymmetric-crypto:
                    description: Public-key cryptography for encryption, key exchange, and digital signatures using RSA, ECC, and related algorithms with mathematically linked key pairs.
                  cryptographic-hashing:
                    description: Cryptographic hash functions, message authentication codes, and password hashing algorithms like SHA-256, HMAC, and Argon2 for integrity verification and authentication.
                  key-management:
                    description: Key generation, secure storage, distribution, rotation, and lifecycle management including HSMs, KMS, secrets management, and key ceremony processes.
                  tls-protocols:
                    description: TLS, SSL, and other secure communication protocols for network security, handshake negotiation, certificate validation, and cipher suite configuration.
              pentest:
                description: Penetration testing, red team, vulnerability discovery.
                children:
                  web-pentest:
                    description: Testing web applications and APIs for security vulnerabilities including injection flaws, cross-site scripting, and authentication bypasses.
                  network-pentest:
                    description: Assessing internal and external network infrastructure, services, and devices for exploitable weaknesses and misconfigurations.
                  mobile-pentest:
                    description: Evaluating iOS and Android mobile applications and their backend services for data leakage, insecure storage, and API vulnerabilities.
                  cloud-pentest:
                    description: Testing cloud-native infrastructure, serverless functions, container orchestration, and IAM configurations across AWS, Azure, and GCP.
                  red-team-ops:
                    description: Conducting full-scope adversarial simulations that emulate real-world threat actors to test organizational detection and response capabilities.
              compliance-eng:
                description: SOC2, ISO 27001, security audits, compliance evidence.
                children:
                  audit-prep:
                    description: Coordinating audit activities, gathering and organizing evidence, managing auditor requests, and tracking findings and remediation for SOC2, ISO 27001, and other security certifications.
                  policy-mgmt:
                    description: Drafting, reviewing, approving, and maintaining information security policies, procedures, standards, and other governance documentation required by compliance frameworks.
                  control-implementation:
                    description: Designing, building, and configuring technical security controls, access management, logging, and monitoring systems to meet specific compliance framework requirements.
                  continuous-compliance:
                    description: Automating ongoing control monitoring, continuous evidence collection, drift detection, and compliance posture reporting to maintain audit readiness.
                  framework-mapping:
                    description: Mapping controls across multiple compliance frameworks like SOC2, ISO 27001, NIST, and GDPR to identify overlaps and minimize redundant implementation efforts.
              threat-modeling:
                description: Threat modeling, attack trees, risk assessment.
                children:
                  methodologies:
                    description: Frameworks and systematic approaches for identifying and analyzing threats, including STRIDE, PASTA, OCTAVE, and DREAD, used to structure the threat modeling process.
                  tools:
                    description: Software applications and platforms for creating, visualizing, and managing threat models, such as Microsoft Threat Modeling Tool, OWASP Threat Dragon, and commercial alternatives.
                  attack-trees:
                    description: Hierarchical diagrams that represent potential attack paths and exploit sequences, showing how adversaries can achieve specific goals through layered vulnerabilities.
                  risk-prioritization:
                    description: Techniques for evaluating, scoring, and ranking identified threats based on impact and likelihood to focus mitigation efforts on the most critical risks.
                  sdlc-integration:
                    description: Practices for embedding threat modeling activities within software development lifecycles, including automation, CI/CD pipeline integration, and shift-left security approaches.
          architecture:
            description: >
              System architecture, design patterns, distributed systems,
              technical decision records, scalability planning.
            children:
              microservices:
                description: Microservices architecture, service boundaries, API gateways.
                children:
                  service-decomposition:
                    description: Strategies for defining service boundaries and breaking monolithic applications into independently deployable microservices based on business capabilities or domain-driven design.
                  inter-service-communication:
                    description: Patterns and protocols for synchronous and asynchronous communication between microservices, including REST, gRPC, message queues, and event streaming.
                  data-consistency:
                    description: Managing distributed data across microservices using patterns like saga transactions, event sourcing, CQRS, and eventual consistency to maintain business invariants.
                  service-discovery:
                    description: Mechanisms for microservices to dynamically locate and connect to each other at runtime using service registries, DNS, or mesh infrastructure.
                  observability:
                    description: Implementing distributed tracing, metrics collection, and centralized logging to monitor health, diagnose failures, and understand system behavior across microservice boundaries.
              monolith:
                description: Monolithic architecture, modular monoliths, when not to split.
                children:
                  modular-monolith:
                    description: Design patterns for organizing a monolithic codebase into decoupled modules with clear boundaries, separate data models, and controlled dependencies to maximize maintainability while preserving deployment simplicity.
                  tradeoffs:
                    description: Evaluation criteria for deciding between monolithic and distributed architectures, considering factors like team size, domain complexity, startup overhead, performance characteristics, and operational costs.
                  migration:
                    description: Strategies for decomposing a monolith into microservices using the strangler fig pattern, domain-driven design, database refactoring, and incremental service extraction to minimize risk.
                  scalability:
                    description: Techniques for scaling monolithic applications through vertical hardware upgrades, caching strategies, database optimization, connection pooling, and background job processing.
              event-driven:
                description: Event-driven architecture, sourcing, CQRS, sagas.
                children:
                  event-sourcing:
                    description: Storing application state as an immutable sequence of events to enable audit trails, temporal queries, and system replay for debugging or rebuilding state.
                  cqrs:
                    description: Separating read and write operations into distinct models with separate data stores to optimize performance, scalability, and security for each access pattern.
                  event-sagas:
                    description: Managing long-running distributed transactions across multiple services by choreographing a series of events with compensating actions for rollback scenarios.
                  message-brokers:
                    description: Infrastructure middleware like Apache Kafka or RabbitMQ that provides durable event storage, pub/sub routing, and guaranteed delivery between decoupled producers and consumers.
                  event-schema-management:
                    description: Defining, versioning, and enforcing compatibility rules for event payloads using schemas like Avro or Protobuf to prevent breaking changes in distributed systems.
              distributed-systems:
                description: Consensus, CAP, distributed transactions, eventual consistency.
                children:
                  consensus-algorithms:
                    description: Questions about algorithms for reaching agreement across nodes in distributed systems, including Raft, Paxos, PBFT, leader election, and quorum mechanisms.
                  distributed-storage:
                    description: Questions about storage systems that span multiple nodes, covering distributed databases, file systems, key-value stores, and object storage architectures.
                  consistency-models:
                    description: Questions about guarantees for data consistency across distributed nodes, including eventual consistency, strong consistency, causal consistency, session guarantees, and CAP theorem tradeoffs.
                  fault-tolerance:
                    description: Questions about designing systems to handle failures gracefully, including failure detection, recovery mechanisms, resilience patterns, circuit breakers, and graceful degradation.
                  distributed-transactions:
                    description: Questions about coordinating atomic operations across multiple services or data stores, including two-phase commit, Saga pattern, TCC, and compensating transactions.
                  replication-sharding:
                    description: Questions about distributing data across nodes through replication and partitioning strategies, including master-slave, multi-master, consistent hashing, and sharding schemes.
              api-gateways:
                description: API gateways, BFF pattern, edge services.
                children:
                  bff-pattern:
                    description: Backend for Frontend pattern implementation strategies and best practices for creating tailored gateway services per client type.
                  security-policies:
                    description: Authentication, authorization, rate limiting, and web application firewall configuration for protecting APIs at the gateway layer.
                  traffic-routing:
                    description: Request routing rules, load balancing algorithms, canary deployments, and circuit breaker patterns for managing API traffic flow.
                  observability-monitoring:
                    description: Logging, metrics collection, distributed tracing, and analytics setup for monitoring gateway performance and debugging API issues.
                  performance-optimization:
                    description: Response caching strategies, payload compression, protocol translation, and edge caching techniques to optimize API gateway performance.
          programming-languages:
            description: >
              Programming language choice, language-specific patterns and
              idioms, language ecosystems and tooling.
            children:
              python:
                description: Python language, packages, idioms, async, typing.
                children:
                  async-programming:
                    description: Asynchronous programming patterns in Python using asyncio, async/await syntax, event loops, coroutines, and async-compatible libraries for concurrent I/O operations.
                  type-hints:
                    description: Python's type annotation system, the typing module, static type checking with mypy, generics, protocols, and gradual typing best practices.
                  web-frameworks:
                    description: Web development using Django, Flask, FastAPI, or Pyramid, including routing, middleware, templating, ORM, and deployment patterns.
                    children:
                      django-specific:
                        description: Covers Django's batteries-included features like its ORM, admin interface, forms, authentication system, and signal dispatching.
                        children:
                          models-and-orm:
                            description: Django's object-relational mapper for defining database models, managing migrations, constructing querysets, and handling relationships between models.
                            children:
                              model-fields-and-meta:
                                description: Defining Django model structure with field types, options, constraints, and Meta class configuration for database table mapping and model behavior.
                              schema-migrations:
                                description: Creating, applying, and managing database schema changes through migration files, including data migrations, squashing, and version control best practices.
                              queryset-operations:
                                description: Constructing database queries using QuerySet methods, filters, annotations, aggregations, Q objects, and F expressions for data retrieval and manipulation.
                              model-relationships:
                                description: Configuring and querying relationships between models using ForeignKey, ManyToManyField, and OneToOneField, including related_name, on_delete behavior, and join operations.
                              managers-and-methods:
                                description: Implementing custom model managers, model methods, and overriding built-in methods like save() and delete() to encapsulate business logic and query customization.
                          admin-interface:
                            description: Django's automatically generated administrative interface for managing site content, including customization of admin views, actions, and inlines.
                          forms-and-validation:
                            description: Django's form handling system for HTML form generation, server-side validation, widget rendering, and processing of formsets and model forms.
                          authentication-authorization:
                            description: Django's built-in user authentication and authorization system covering user models, login/logout flows, permission checks, groups, and session management.
                            children:
                              user-model-customization:
                                description: Covers extending Django's User model with custom fields, implementing entirely custom user models via AbstractUser or AbstractBaseUser, managing related profiles, and handling associated migration challenges.
                              authentication-views-forms:
                                description: Encompasses Django's built-in authentication views for login, logout, password reset and change, their associated form classes, URL configuration, and template customization for these flows.
                              permissions-authorization:
                                description: Deals with Django's permission and group system, model-level versus object-level permissions, authorization decorators like @login_required, mixins for class-based views, and programmatic access control.
                              session-management:
                                description: Focuses on session engine configuration, cookie management, expiration settings, choosing between database or cache-backed sessions, and implementing secure remember-me functionality.
                          signals-dispatch:
                            description: Django's signal dispatcher for decoupled communication between components, including built-in model and request signals and custom signal definitions.
                          class-based-views:
                            description: Django's class-based view system providing reusable generic views, mixins, and base classes for common patterns like list, detail, form, and edit views.
                      flask-specific:
                        description: Focuses on Flask's minimalist approach, extension ecosystem, blueprint organization, application/request contexts, and Jinja2 templating.
                        children:
                          application-factory:
                            description: Creating Flask applications using the factory pattern for flexible configuration management, environment-specific settings, and improved testability across different deployment scenarios.
                          extension-ecosystem:
                            description: Working with Flask's extension ecosystem, including initialization patterns, configuration management, and integration with popular extensions like Flask-SQLAlchemy, Flask-Login, and Flask-WTF.
                          blueprint-organization:
                            description: Structuring Flask applications using blueprints to modularize routes, templates, static files, and functionality into reusable components with independent routing and template folders.
                          context-locals:
                            description: Understanding and using Flask's application and request contexts, including the g, current_app, request, and session objects, plus managing context in tests, CLI commands, and asynchronous tasks.
                          jinja2-customization:
                            description: Implementing Flask-specific Jinja2 features such as context processors for global template variables, custom filters and tests, template inheritance strategies, and Flask's template rendering pipeline.
                      fastapi-specific:
                        description: Addresses FastAPI's async capabilities, dependency injection system, Pydantic model validation, automatic API documentation, and type hint enforcement.
                        children:
                          async-and-concurrency:
                            description: Covers FastAPI's asynchronous request handling, background tasks, concurrency with async/await syntax, event loop management, and performance considerations for I/O-bound operations.
                          dependency-injection:
                            description: Focuses on FastAPI's dependency injection system for managing shared resources, database sessions, authentication, and reusable components across endpoints with automatic lifecycle management.
                          pydantic-models:
                            description: Addresses Pydantic model definition, validation rules, custom validators, serialization configurations, and complex data structures for request/response handling in FastAPI applications.
                          api-documentation:
                            description: Deals with automatic OpenAPI schema generation, Swagger UI and ReDoc customization, adding examples and metadata to endpoints, and maintaining interactive API documentation.
                          security-and-authentication:
                            description: Covers OAuth2 flows, JWT token handling, API key authentication, HTTP security utilities, and implementing secure endpoints using FastAPI's built-in security dependencies.
                      routing-and-middleware:
                        description: Encompasses URL routing patterns, request/response middleware, WSGI/ASGI interfaces, and view dispatch across all Python web frameworks.
                      templating-and-frontend:
                        description: Includes server-side template rendering with Jinja2 or Django templates, static file management, and frontend framework integration.
                      deployment-and-production:
                        description: Covers production deployment strategies, WSGI/ASGI servers like Gunicorn and Uvicorn, containerization, and cloud platform configurations.
                  data-science:
                    description: Scientific computing and data analysis with NumPy, Pandas, Matplotlib, SciPy, Jupyter notebooks, and the core data science toolchain.
                    children:
                      data-wrangling:
                        description: Cleaning, transforming, and preparing structured data using Pandas, including handling missing values, reshaping, and aggregation operations.
                      numerical-computing:
                        description: Performing array-based computations, linear algebra, and numerical methods with NumPy for efficient mathematical operations on large datasets.
                      data-visualization:
                        description: Creating static and interactive charts, plots, and graphs using Matplotlib, Seaborn, and Plotly to explore and communicate data insights.
                      statistical-analysis:
                        description: Applying statistical tests, probability distributions, and modeling techniques with SciPy and statsmodels for hypothesis testing and inference.
                      notebook-workflows:
                        description: Developing and sharing reproducible analyses using Jupyter notebooks, IPython, and interactive computing environments for iterative exploration.
                      data-formats:
                        description: Reading, writing, and manipulating various file formats including CSV, Parquet, HDF5, JSON, and database connections for data import and export.
                  machine-learning:
                    description: Machine learning and deep learning with scikit-learn, TensorFlow, PyTorch, Keras, model training, evaluation, and deployment workflows.
                    children:
                      deep-learning-frameworks:
                        description: Building and training neural networks using TensorFlow, PyTorch, and Keras, including layer design, backpropagation, GPU acceleration, and specialized architectures like CNNs and transformers.
                      model-training-techniques:
                        description: Implementing training workflows with optimization algorithms, loss functions, custom loops, callbacks, early stopping, regularization, and distributed training strategies across frameworks.
                      model-evaluation-validation:
                        description: Assessing model performance using metrics like accuracy, precision, recall, ROC-AUC, cross-validation, confusion matrices, and validation curves for classification and regression tasks.
                      model-deployment-serving:
                        description: Deploying trained models to production with TensorFlow Serving, TorchServe, FastAPI, Docker, cloud platforms, and optimizing inference latency, scalability, and versioning.
                      hyperparameter-optimization:
                        description: Tuning model hyperparameters via grid search, random search, Bayesian optimization, and tools like Optuna, Ray Tune, and scikit-learn's hyperparameter search utilities.
                      ml-ops-lifecycle:
                        description: Managing ML lifecycle with experiment tracking, model versioning, pipeline automation, monitoring, and CI/CD integration using MLflow, Weights & Biases, Kubeflow, or SageMaker.
                  package-management:
                    description: Python package installation and environment management using pip, conda, virtualenv, venv, pipenv, or poetry for dependency resolution.
              javascript:
                description: JavaScript and TypeScript, Node.js, browser APIs.
                children:
                  frontend-frameworks:
                    description: Questions about React, Vue, Angular, Svelte, and other client-side frameworks for building user interfaces.
                  node-js-runtime:
                    description: Server-side JavaScript development using Node.js, including its core modules, file system, networking, and process management.
                  typescript-language:
                    description: TypeScript-specific features like static typing, interfaces, generics, decorators, and compilation configuration.
                  build-tools:
                    description: Bundlers, transpilers, and development tooling including Webpack, Vite, Rollup, Parcel, and Babel configuration.
                  package-management:
                    description: npm, yarn, pnpm, package.json, semantic versioning, dependency resolution, and monorepo management.
                  browser-apis:
                    description: Web APIs including DOM manipulation, Fetch API, Canvas, WebGL, Service Workers, Storage, and other browser capabilities.
                  async-programming:
                    description: Asynchronous patterns in JavaScript including Promises, async/await, event loop, callbacks, and reactive programming with Observables.
              go:
                description: Go language, goroutines, channels, standard library.
                children:
                  concurrency:
                    description: Go's concurrency model including goroutines, channels, the select statement, sync package primitives, and patterns for building concurrent applications.
                  standard-library:
                    description: Core packages provided by Go's standard library such as fmt, io, net/http, encoding/json, and common usage patterns for everyday development tasks.
                  modules:
                    description: Dependency management using Go modules including go.mod file structure, version selection, private repositories, and module publishing workflows.
                  tooling:
                    description: The Go command-line toolchain for building, formatting, vetting, and maintaining code including go build, go fmt, go vet, and compiler flags.
                  testing:
                    description: Built-in testing framework covering unit tests, table-driven tests, benchmarks, examples, test coverage analysis, and the testing package.
                  interfaces-types:
                    description: Go's type system including interface definition and implementation, struct composition, type assertions, and generic programming with type parameters.
                  error-handling:
                    description: Go's idiomatic error handling patterns including explicit error returns, the errors package for error wrapping and inspection, and panic/recover mechanisms for exceptional conditions.
                  networking:
                    description: Building network services and clients in Go using the net/http package for HTTP/HTTPS, TCP/UDP programming with the net package, and related protocols like WebSockets and gRPC.
                  memory-management:
                    description: Go's garbage collector behavior, escape analysis for stack vs heap allocation, pointer usage patterns, and techniques for optimizing memory allocation and reducing GC pressure.
                  generics:
                    description: Type parameters and constraints introduced in Go 1.18, including generic functions, types, interfaces with type sets, and their application in writing reusable, type-safe code.
                  cgo:
                    description: Interfacing Go with C code through cgo, including calling C libraries, passing data between languages, build constraints, and managing the performance overhead of FFI crossings.
                  context:
                    description: The context package for managing cancellation signals, deadlines, timeouts, and request-scoped values across goroutines and API boundaries in distributed systems.
              rust:
                description: Rust language, ownership, traits, async, performance.
                children:
                  ownership-borrowing:
                    description: Questions about Rust's ownership model, move semantics, borrowing rules, and lifetime annotations that enforce memory safety at compile time.
                  async-concurrency:
                    description: Queries about asynchronous programming with async/await syntax, Future trait, runtime selection like Tokio, and concurrent execution patterns.
                  traits-generics:
                    description: Questions about defining and implementing traits, writing generic functions and types, and using trait bounds for polymorphic code.
                  performance-optimization:
                    description: Queries about optimizing Rust code for speed or memory usage, including benchmarking, profiling, and understanding compiler optimizations.
                  cargo-tooling:
                    description: Questions about Cargo package manager, dependency management, build scripts, workspaces, and the broader Rust toolchain.
                  unsafe-code:
                    description: Queries involving unsafe blocks, raw pointers, FFI integration, and other operations that bypass Rust's safety guarantees.
                  error-handling:
                    description: Patterns and mechanisms for handling errors using Result, Option, the ? operator, and error trait implementations.
                  lifetimes:
                    description: Understanding and working with lifetime annotations, elision rules, and lifetime bounds for references and generic types.
                  macros:
                    description: Creating and using declarative and procedural macros for metaprogramming and code generation.
                  ffi-interop:
                    description: Interfacing Rust with other languages via Foreign Function Interface, including C bindings and ABI compatibility.
                  testing:
                    description: Writing and organizing unit tests, integration tests, documentation tests, and using testing frameworks.
