version: 2.0.0

# hybrid-v2 — simplified taxonomy, max depth 3, ≤500 nodes.
#
# Goals:
#   - Replace v1's deep wrapper layers (fun-hobbies/sports-watching/...) with
#     direct depth-2 categories (sports/, entertainment/, etc.)
#   - Drop relationship suffixes (basketball-fan → basketball)
#   - Every leaf at depth 3 — no exceptions
#   - Empirically validated against the v04 ChatGPT report (100 conversations)
#
# Description style: 1-2 sentences, comma-separated subtopic list. Used as
# the embedding text for the EmbeddingTagger. Keep concise but distinguishing.
#
# See docs/status-classification.md for v1→v2 transition notes.

